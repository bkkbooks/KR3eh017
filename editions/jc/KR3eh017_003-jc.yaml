body:
  text: 卷下雜症痹症章痹與風病相似但風則陽受之痹則陰受之故多沉著且痛大凡邪中於經為痹邪中於絡為痿金匱云經熱則痹絡熱則痿初病濕熱在經久則瘀熱入絡痹症有五原歸一皮脈與肌筋與骨風行寒痛濕著彰內經三氣風寒濕以致麻木疼痛加不能行動但能食痹者閉不通之云邪阻正氣經絡塞皆由虛損腠理開三氣乘虛自外襲留滯於內為病多濕痰濁血都凝澀法治法邪養正先暢達氣血通絡脈峻補真陰為屬陰風燥之品用不得舒筋赤芍草薑黃沉香汁歸當歸羌活海桐皮益濕熱致痹宜舒通脈絡使清陽流行生耆法半夏防風桑枝膏生術川羌活薑黃川桂枝陝當歸羚羊角猺肉桂炙甘草漢防己苡仁生地白茯苓炙龜版杏仁阿膠川通草料豆皮紫川樸天花粉綿茵陳石膏老蘇梗川石斛湖丹皮鬱金暑傷氣濕熱入絡為痹人參生於術廣皮生薑汁茯苓半夏川黃連枳實鮮竹瀝澤瀉寒濕為痹宜微通其陽兼通補法金狗脊川杜仲仙靈脾熟附子生虎骨淮牛膝川桂枝白朮杞子茯苓防己晚蠶砂當歸萆薢澤瀉苡仁肝膽風熱為痹宜甘寒和陽法羚羊角元參桂枝茯苓石斛杞子白蒺藜丹皮桑枝生地天冬肝胃虛滯為痹陽氣煩蒸當兩補厥陰陽明黃耆首烏白蒺藜於朮歸身料豆衣氣滯熱鬱為痹因病後過食肥膩栝蔞皮蘇梗廣鬱金苦杏仁橘皮半夏曲血虛絡澀為痹鮮赤首烏童桑枝黑芝麻九制首烏川桂枝熱入下焦血分為痹歸身柏子仁鉤藤川萆薢牛膝丹皮白菊花苡仁生虎骨茯苓風寒濕入下焦經隧為痹宜辛溫以宣通經氣活絡丹川烏地龍穿山甲大黑豆皮衛陽疏風邪入絡為痹風淫治以甘寒法羚羊片杏仁海桐皮元參童桑枝川桂枝花粉漢防己連翹綠豆皮肝陰虛瘧邪入絡為痹大熟地阿膠天冬五味龜版膠秋石麥冬茯神氣虛成痹舒筋湯加黃耆廣皮茯苓桂枝防風根營虛成痹人參歸身炙草南棗茯苓白芍桂枝精血虛延痹鹿角膠枸杞子桑椹子天冬茯苓淡蓯蓉川杜仲沙苑子虎骨陳參曰治痹之法只宜峻補真陰宣通絡脈使氣血得以流行不得過用風燥藥以再傷真陰痿症章邪中於絡為痿又絡熱則痿痿不外乎肝腎肺胃四經之病肝主筋肝傷則四肢不為人用而筋骨拘攣腎藏精精血相生精虛則不能灌溉諸末血虛則不能營養筋骨肺主氣為清高之臟肺虛則高源化絕化絕則水涸水涸則不能濡潤筋骨陽明為宗筋之長陽明虛則宗筋縱而不能束筋骨以利機關經云濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿四肢軟弱痿症成不癢不痛難趨行五痿筋脈骨肉氣治法獨取陽明經陽明本為宗筋長主潤宗筋合相養虛則宗筋縱不收束骨利關職不掌總由肝腎肺胃傷四末無用肝脾殃肺熱何由得濡潤高源化絕水涸彰清心補腎二四四君四物等湯利梔芩化熱桔引肺杜仲牛膝栝蔞麥冬黃耆五味木瓜木通通竅升麻提氣治痿之法專補陰壯骨補虛藥須備肺熱葉焦如形瘦脈數玉竹地骨皮百合北沙參麥冬杏仁桑葉如面瘰跗軟連翹濕熱蒸鑠筋骨為痿茅朮川柏寒水石防己茵陳茯苓晚蠶沙萆薢杏仁飛滑石木通龍膽草胃氣窒塞為痿氣塞胃呆筋骨不利加味溫膽湯更衣丸邪風入絡為痿口鼻歪斜而起羚角大生地元參川石斛犀角川萆薢黃柏陽明虛營絡熱內風動成痿宜清營熱熄內風法犀角元參明天麻鉤藤生地連翹冬桑葉丹皮胃陽督任皆虛為痿當兩固中下鹿角膠淡蓯蓉巴戟肉歸身牛膝柏子仁補骨脂白茯苓杞子川斛肝腎兩虛為痿熄風納下河間地黃飲子熟地巴戟肉山萸肉淡蓯蓉附子官桂石斛白茯苓石菖蒲遠志麥冬五味子虎潛丸熟地虎脛骨知母當歸川柏敗龜版鎖陽白芍牛膝廣陳皮羚羊肉脾腎陽虛為少女暈中肌麻腹鳴瘕泄用脾腎兩補衝任虛寒為痿用薛氏加減八味丸督陽奇脈兼虛為痿鹿角淡蓯蓉菟絲子遠志白茯苓覆盆子督陽虛為痿如歷節汗出筋骨腰脊痠軟冬月尤甚麝茸麝香生羊腎子歸身川烏酒煮為丸骨痿由精血內奪奇脈少氣當填精補髓鹿角屑羊肉膠虎骨巴戟天豬脊髓線魚膠龜版懷熟地淡蓯蓉沙苑子枸杞川黃柏青鹽川杜仲白茯苓牛膝陳歸身陳參曰治痿之法經云獨取陽明無非流通胃氣以為脈主乎束筋骨利機關也頭頸轟然熱蒸痰涎湧出味酸此督脈不司納束腎虛收納無權陰火上炎內風齊煽宜通納入脈以收拾散失之陰陽麻木章麻木不仁症何治二陳四物湯須識總是濕痰死血成活血開痰法先試兩臂桂枝不可無下部靈仙牛膝使補中益氣青皮附香附香木香白芥紅花桃仁藥兼備營虛肝風挾痰指末脹麻煨天麻羚羊片桂枝茯苓膽星白芍鉤藤鉤石決明桑枝秦芄歸身肝腎虛眩暈耳鳴心悸指末麻生地西杞子遠志石菖蒲桂枝阿膠羚羊角茯神炙龜版牡蠣歸身白蒺藜胡麻湖丹皮白芍料豆皮桑葉炒山梔癇症章癇症或因驚恐或由飲食不節或由母腹中受驚以致內臟不平經久失調一觸積痰厥氣內風猝然暴逆莫能禁止待其氣平然後已至於主治要在辨其虛實耳癇痓暈倒時流涎聲類畜叫五癇傳癇醒身軟痓反是皆由痰與驚專權驚則神志不守舍舍空痰如心竅填肝膽胃經挾痰火三陽合併升而然行痰為主清熱次犀角二陳石菖蒲膽星連川連枳殼蔞皮藤橘姜竹瀝茯神郁金遠志宜同煎驚恐痰火升發癇黃連山梔廣皮膽星黃芩枳實遠志菖蒲陽氣鬱竅絡阻發癇厥羚羊角川柏姜半夏連翹陳膽星遠志廣鬱金元參鉤藤鉤白芍川黃連煨天麻廣皮清阿膠水火鬱血滯兼癇婦人經來紫黑生地紫丹參炒山梔西珀屑丹皮胡黃連茺蔚子肝腎陽開發癇入冬不寐陽不滑藏虎潛丸見前陳參曰癇症有風熱有驚邪皆兼虛與痰所致幼科方書小兒有五癇五臟各有畜所屬聲如羊者心癇聲如犬者肝癇聲如牛者脾癇聲如雞者肺癇聲如豬者腎癇痓風病也難經督脈為病脊強而厥張仲景云脊強者五痓之總名其症卒口噤背張而瘛瘲痓癲狂怔忡不寐健妄等章癲出積憂積鬱病在心脾包絡之陰蔽而不宣致氣鬱痰迷神志為之混淆狂由大驚大恐病在肝膽胃經三陽並而上升致火熾痰湧心竅為之閉塞不寐總由陽不交陰所致若因外邪而不寐者當連去其邪攘外即所以安內也若因里症而不寐者或焦勞過度而離宮內熱或憂勞積鬱而耗損心脾或精不凝神而龍雷振盪或肝血無藏而魂搖神漾胃病則陽蹺穴滿膽熱則口苦心煩審病用方法無一定狂症屬陽主多怒癲症屬陰主多喜心熱為狂肝實癲均為熱症河間議心經有損七情傷鎮心安神最為利天王補心用三參人參丹參元參酸棗地歸二冬味遠志柏仁桔茯神燈草辰砂石菖配怔忡健忘都可醫加減天王補心治怔忡人呆將捕如惕惕不寧神明殊心為人主血為主神不守舍心血虛健忘雖因氣血隔盛怒傷志亦成疾靜則神藏躁消亡心氣不充神憊極陽不變陰非外邪此方亦可不寐吃即天王補心丸發狂木火動心神虛人參元參棗仁天冬丹參茯神川連麥冬生地遠志桔梗伯仁菖蒲發癲鬱火心腎不交脈不鼓指生地酒炒連山梔茯神竹葉川柏炙坎版菖蒲遠志心火不寐鮮生地元參竹葉心淨銀花麥冬綠豆皮膽火不寐丹皮半夏鉤藤溫膽湯山梔桑葉橘紅脾營虛用歸脾湯為主不寐胃病陽蹺脈虛早服八味丸晚服半夏秫米湯不寐怔忡膽液虧陽升虛煩金匱酸棗仁湯棗仁甘草知母茯苓川芎不寐健忘肝腎陰虧陽浮鹹苦酸收甘緩法龜版膠熟地萸肉五味子寧淡菜川柏遠志白茯苓鹿角膠大熟地淡蓯蓉羊腎子何書田曰癲之實者以滾痰丸開痰之壅塞清心丸泄火之鬱勃虛者當養神而通志歸脾丸枕中丹狂之實者以承氣湯白虎湯直折陽明之火生鐵落飲重製肝膽之邪虛者當壯水以制火二陰煎之類生地棗仁元參茯苓麥冬甘草黃芩木通思慮煩勞身心過動風陽內擾則營熱心悸驚怖不寐脅中動躍治以酸棗仁湯棗仁知母川芎甘草茯苓補心丹枕中丹清營之熱佐以斂攝神志陳參曰靈樞經云陽氣下交於陰陽蹺脈滿令人得寐黃疸章疸分陰陽而總以濕得之陽疸者濕從火化瘀熱在裡膽熱液泄與胃之濁氣相併上不得越下不得泄熏蒸遏郁侵於肺則身目俱黃熱流膀胱溺變赤其色明陽主明治在胃陰黃者濕從寒水脾陽不能化熱膽液為濕所阻漬於脾浸淫肌肉蘊於皮膚黃如熏其色晦陰主晦治在脾黃疸者身黃目黃溺黃之謂也黃疸分五名固有黃汗女勞濕熱酒總歸濕熱相鬱蒸脾胃兼虛為日久茵陳五苓散主之隨病增減方堪施病久腹脹兼黑色此為不治先當知谷疸不宜下犯足太陰防變脹豬肚丸豬肚苦參白朮牡蠣又方綿茵陳茯苓皮蔻仁花粉枳實苦桔梗疸後郁傷心脾用歸脾丸酒疸四君子湯加陳皮白芍當歸柴胡生薑大棗陳參曰酒客多蘊熱宜先清中分利後顧脾陽濕熱鬱蒸黃疸濕在上宜辛散法取以風勝防己大豆卷苡仁銀花滑石生牡蠣枳實法半夏薑汁濕在下宜苦泄法取以淡滲黃柏赤小豆石膏杏仁山梔連翹通草花粉疸變腫脹大腹皮海金沙粉豬苓雞肫皮紫川樸川通草黃疸脈絡瘀熱此與水穀氣交蒸河間金鈴子散加枳實柴胡半夏黃芩山梔穀芽黃疸脾液外越夏熱泄氣脾虛為黃非濕熱之疸人參白扁豆茯神炙草懷山藥米仁何書田曰脈弦脅痛少陽未罷仍主和渴飲水漿陽明化燥急當瀉熱如狂蓄血主攻汗後溺血主補表虛者實衛裡虛者建中女勞有穢濁始以解毒繼之滑竅終當峻補腎之真陰夢遺章有夢為心病無夢為腎病濕熱為小腸膀胱失精之藏制雖在腎而精之主宰則在心其精血下注濕熱混淫而遺滑所致者責在小腸膀胱故治是症不外寧心益腎填精固攝清熱利濕諸法有夢治心無夢治腎左腎藏精右氣火相火一動精不固外動酒漿濕熱欲內動多思多想故精者有水本靜居無以擾之凝然如一擾便動且妄行遺精滑精漸致虛年少元陽氣極盛如瓶之滿滿而溢心有妄念邪火乘如瓶之側側而出相火易動真元虛精道不固腎液竭如瓶之罅漏漸干此病最重最難澀安神降火主治之四物歸脾收澀吃陰虛陽越兼遺滑用厚味填精介類潛陽養陰固攝諸法熟地覆盆子芡實山藥湖連桑螵蛸茯神川斛沙苑線魚膠生地萸肉麥冬遠志肉天冬川柏女貞金櫻膏柏仁青鹽牡蠣炙坎版淡菜炙草陰虛濕熱遺滑苦泄兼通腑川柏川萆薢知母澤瀉川蓮苡米仁芡實茯苓豬苓湯下損及中夢遺有夢而遺煩勞過度致脾胃兩傷心腎不交上下兩損當培土固攝妙香散補心湯生脈四君歸脾湯冬朮膏桑螵蛸散腎氣不攝夢遺兼滑熟地山萸肉山藥湖蓮金櫻子五味紫河車芡實龍骨菟絲子覆盆子沙苑子兼失血熟地五味山藥人參枸杞茯神牛膝魚螵蛸花龍骨桑螵蛸何書田曰房勞過度精竭陽虛寐則陽陷而精道不禁隨濁隨泄不夢而遺當用濟生固精丸花龍骨左牡蠣菟絲子家韭子白茯苓五味子桑螵蛸白石脂升固八脈之氣飲食宜厚脾胃釀成濕熱留伏陰中而夢泄者當用劉檀石脂肚丸白朮牡蠣以豬肚苦參一具同煎清脾胃蘊蓄之溫熱無夢遺精腎關不固精竅滑脫而成也用桑螵蛸散人參菖蒲遠志秦當歸茯神龍骨龜版桑螵蛸與陰固攝滑澀互施上實下虛火風震動脾腎液枯用斑龍二至百補丸人參鹿角菟絲子熟地杞子山萸肉五味子天冬茯苓淮牛膝芡實龍眼西黃耆麥冬山藥金櫻子楮實通攝下焦龍相交熾陰精走漏用三才封髓丹及滋腎丸大補陰丸熟地金狗脊知母川柏炙龜版峻補真陰承製相火以瀉陰中伏熱濁症淋症章濁屬心腎淋為肝膽痛則為淋不痛為濁遺由精竅淋在溺竅異出同力最宜分別切勿混治濁症原分赤與白白屬氣分赤屬血脾胃濕熱注膀胱水液渾濁皆屬熱本內經主治清心蓮子飲痰注膀胱二陳合白由腎虛萆薢飲赤是血虛合四物淋症血石勞氣膏滴瀝疼痛常呼號心與小腸相表裡心火猶動相火燒欲住不住住又至總將津液常煎熬八正四苓合四物山梔知柏淋應消濁淋二症參看濕熱下注萆薢木通海金沙赤茯豬苓澤瀉川黃柏山梔茵陳鮮竹葉丹皮漢防己子和桂苓飲劉檀石豬肚丸陰虛濕熱淋濁滋腎丸丹溪大補陰丸合水陸二仙膏加牡蠣金櫻膏六味丸去萸肉加車前牛膝心火下陷淋濁心陽亢而下注利其火府分清飲加山梔丹皮茯苓豬苓清利火府用導赤散加赤苓瞿麥又方川連生地人參桔梗川柏茯苓丹參菖蒲氣閉成淋紫苑栝蔞皮鬱金降香杏仁枇杷葉山梔食入痞滿便淋照前方去紫菀山梔加苡仁膀胱蓄熱血淋小便短赤帶血用導赤散加赤茯苓西血珀屑五分又方黃柏知母山梔生地龍膽草丹皮酒大黃淡竹葉當歸郁李仁元紅花精濁陰虧炙龜版熟地天冬肥知母淡秋石川柏茯苓豬脊筋腎虛不攝淋濁脈細腰痠遺瀝胃減宜收納肝腎茯苓青鹽胡桃腎氣湯加淡蓯蓉鹿角大茴香敗精濁瘀阻竅用虎杖散加韭白汁製大黃麝香少許入絡通血白醜桃仁歸鬚桂枝小茴杜牛膝歸尾山梔川楝子韭白兩頭尖川柏遠志淡蓯蓉柏仁茯苓生鹿角大黃小茴加麝香又方阿膠生地女貞子料豆皮琥珀屑淋濁奇脈病敗精內滯因溺強出積久精血皆枯當以沖督任帶調理亦如婦人之漏帶也鹿茸小茴香歸身人參杞子龜版心茯苓柏霜補骨脂覆盆子菟絲子又方鹿茸韭子胡桃沙苑子舶茴香何書田曰便濁只在氣虛與濕熱實者宣通水道虛者調養中州虛實兩兼又宜益臟通腑精濁總由肝腎損傷而有精瘀精滑之分精瘀當先理離宮腐濁然後補腎精滑用固補斂攝不應從真元氣調之張景岳所謂其無形以固有形也然人必知八脈治用孫真人九法升奇陽固精絡使督任有權漏卮自已尿血一症虛者居多若有火亦能作痛當與血淋同治如清之不愈專究乎虛則上注心脾下從肝腎久則主乎八脈陳參曰厥陰內患最急少腹繞前陰如刺小水點滴難通環陰之脈絡皆痹氣化機關已息必須仿朱南陽法兼參李蘋湖意用滑利通陽辛鹹泄急佐以循經入絡之品古人云九竅不和多屬胃病六腑為治以通為補脾宜升則健胃宜降則和蓋太陰之土得陽始運陽明之土得陰則安脾喜剛燥胃喜柔潤張仲景急下存津治中胃也李東垣大升陽氣治在脾也八正散治濕熱便秘車前子瞿麥山梔燈草細木通滑石大黃扁蓄草甘草木香濕熱盛而宣徹其泉源也陳注小便不通不禁大便不通二便秘脫肛等章人身穢濁二便消通則濁降塞則淆便通則濁降清升否則清濁混淆矣小便不通膀胱熱用藥可與淋同條小便不禁膀胱火火邪妄動難自料水不得安故不禁二神丸合桑螵蛸川連川芎甘草生地當歸大便不通腸液竭活血潤燥方無拋二便閉時肝腎熱八正散服兩可消肛門秘結肺熱致肺與大腸表裡明脫肛肺臟虛寒甚瀉痢入虛陷下遭湯用補中益氣妙熱脫四物知柏邀陰莖囊腫是濕甚而下墜入府用河間法石膏寒水石杏仁澤瀉滑石紫川樸豬苓小便不通小腸火結導赤散加丹皮赤茯苓膀胱氣化失司用五苓散濕壅三焦用河間分消法杏仁桔梗滑石川樸連翹木通香薷陳皮豬苓木瓜川連寒水石澤瀉蘆根黃芩海金沙防己生石膏枳殼六一散濕鬱熱伏小腸痹用小溫中丸腎陽不通五苓散加乾薑炮姜附子豬膽汁腎與膀胱陰分蓄熱致燥無陰則陽無以化用滋腎丸通下焦至陰之熱閉濕熱大腸痹宜清熱燥濕小溫中丸大便秘火腑不通用更衣丸濕火便秘用大苦寒堅陰燥濕法川柏萆薢獨活海金砂細辛川連防己蠶砂川錦紋腎燥熱便難宜溫通下焦用滋腎丸鬱熱燥結氣阻苦寒泄熱辛以開鬱此三焦通治法川連萊菔子川楝子廣皮蘆薈炒山楂炒山梔制樸青皮赤茯苓杏仁廣鬱金血結便秘桃仁泥冬葵子川鬱金郁李仁降真香又方桃仁承氣湯血液枯燥大便不通宜養血潤燥為法歸身柏子仁麥冬沙苑子麻仁松子仁茯苓奎白芍又方生地阿膠龜版又方紅花牛膝菠菜五靈脂桃仁丹皮韭菜郁李仁又方枸杞子天冬人中白川萆薢三才湯五仁湯虎潛丸去瑣陽加淡蓯蓉通幽湯生地紅花熟地桃仁甘草歸身升麻老年陽衰風閉用溫潤通調之法半硫丸二便閉小腸火結蘆薈川楝子桃仁夜分脹用小溫中丸紅花當歸鬚李仁濕熱肺氣不降葦莖桃仁西瓜翠衣滑石通草又養胃法北沙參麥冬杏仁薏仁知母濕熱壅腑便閉川連山梔皮枳實青皮黃芩萊菔子川樸丹皮氣血結痹便閉川楝子桃仁川桂枝當歸鬚郁李仁紅花制川軍小茴香川芎山楂炭肉桂蔥白青皮五靈脂香附血枯經阻便澀大生地牛膝郁李仁歸身車前子淡蓯蓉柏仁冬葵子茯苓小茴香厥陰熱閉二便皆澀少腹脹滿背寒煩渴此為癃閉當用穢濁氣味之品直瀉厥陰之閉兩頭尖韭根小茴香橘紅穿山甲歸鬚川楝子乳香川連山梔通草海金沙川柏淡吳萸青皮滑石又仿李東垣治癃閉法用滋腎丸陳參曰凡小便閉而大便通調者或膀胱熱結或水源不清濕症為多大便閉而小便通調者或大腸氣滯或津液不流燥症居多二便俱閉當先通大便則小便自利矣腎司二便肝主疏泄須辨陰結陽結或下病治上之法開提肺氣喻嘉言上燥治肺下燥治肝脫肛濕熱氣虛下陷從東垣治法用補中益氣湯人參西耆於朮甘草陳皮當歸柴胡大棗升麻生薑脫肛純屬氣虛下陷人參歸身白朮廣皮綠升麻川連白芍炙草烏梅石蓮子腎氣不歸少腹痛肛墜便滑熟地五味遠志肉懷山藥炭茯苓萸肉菟絲餅禹餘糧年老氣陷脫肛人參補骨脂陽起石鹿茸大茴香又禹糧石脂丸陳參曰脫肛一症有因瀉痢氣陷而脫者有因中氣虛寒不能收攝而脫者有因酒濕欲傷而脫者有因腎虛濕注而脫者或年老氣血已衰或年少氣血未旺亦致脫肛經云下者舉之徐之才曰澀可去脫皆治脫肛之法葉天士指南治此症不外升舉固澀益氣三法對氣熱血熱肛而反挺出者則用芩連槐柏皮四物升柴之類然亦間有此症非可訓之法存之以備一說脫肛症不宜過用苦涼大約以葉氏治法為正三消症章嘈症附經云二陽結謂之消二陽者手足陽明也手陽明大湯主津病消則目黃口乾是津不足也足陽明胃主血熱則消穀善飢是血中挾火血不足也未傳能食必發癰疽不能食必傳如脹滿皆不治經云飲食入胃精氣輸脾又脾與胃膜相連又脾主為胃行其津液脾屬陰主血胃屬陽主氣胃易燥全賴脾陰以和之脾易濕必賴胃陽以運之故一陰一陽合沖和之氣而為後天生化之源也若脾陰虛則胃家遊溢之精氣全輸於脾不能稍留津液以自潤則胃過於燥而有火矣故急欲得食以自資遲則嘈雜尤甚若失治則必延成消膈之症上消肺因心移熱二便如常飲水適中消胃熱食偏多大便硬堅小便赤下消腎熱渴飲湯耳輪焦乾便淋瀝雖分肺胃腎三般總是腎水不足得腎水不足虛火炎津液乾枯血虛極地黃飲子六味丸清息用之定有益鬱火致消善飢而渴目加癟心鬱火燃當清陽明之熱以滋少陰生地麥冬生白芍石膏知母西甘草朱丹溪消渴方生地花粉川連藕汁牛乳煩勞心營熱肌瘦飢渴是上中二消病烏犀角元參沙參地骨皮鮮生地麥冬柿霜生甘草又固本丸加人參肝陽犯胃成消石膏生地生白芍人參川斛粳米阿膠知母生甘草麥冬陳皮佩蘭元陽變動爍津成消此甘緩和陽生津法河間甘露飲炙黑草生白芍生地麥冬知母生棗仁腎消飢渴便渾舌碎面赤是陰虛陽氣上燔六味丸加牛膝車前補足三陰腎陰虛胃火脹成消脈左數能食六味丸加天冬麥冬龜版女貞子川萆薢旱蓮腎陰虛心火亢形瘦脈搏渴飲善食三消症也陳曰古人謂入水無物不長入火無物不消河間每以益腎水制心火除腸胃燥熱濟身中液枯是真治法用玉女煎三消症雖有上中下之分其實不外陰虧陽亢津液枯涸熱淫而已當以仲景之腎氣丸本事方之神效散為主腎氣丸助真火蒸化升津液上承神效散取水中鹹寒之物遂其性而治之方用白海浮石蛤殼粉蟬退為末以大鯽魚七個搗爛調服腎消兩腿漸細腰足無力此因中消之後胃熱入腎銷爍腎脂令腎枯槁溲如膏脂晉人云肺主氣肺無病則氣能管束精液其精微者營養筋骨血脈余者為溲肺病則津液無氣管束而精微者亦隨溲下如膏脂也白茯苓丸茯苓元參人參川萆薢覆盆子熟地川連川斛蛇床子白蜜為丸磁石湯下附嘈症嘈有虛實真偽其病總在於胃胃過於燥則火升而嘈得食可止久延便變消渴症陽升嘈雜生地柏子仁茯神麥冬料豆皮川斛心腸熱嘈必煩熱頭汗淮小麥茯神南棗柏子仁炙草辰砂血虛嘈雜兼咽瘡生地麥冬生白芍炙草天冬女貞火麻仁茯神肝陰虛發嘈婦人半日一發夜則更甚生地清阿膠茯神天冬紫丹參白芍陳參曰脾陰虛則胃燥而有火矣治當補脾陰養營血兼補胃陰甘涼濡潤稍佐微酸腳氣章腳氣腳膝時痠疼赤腫兼患脹腹心不腫熱痛乾腳氣氣腫而痛濕氣明因風則麻因寒痛嘔吐喘急憂危臨寒溫濕滲風宜汗熱下諸法須評論又有下陷致跗腫脾氣虛弱胃氣沉脾坤靜德乾健運中氣衝和清濁分脾土受傷不制水水穀之氣下陷應足跗腫者用何法補中益氣湯提升濕熱跗腫痠軟足背赤腫皮亮溲黃川獨活豬苓木瓜黑梔皮滑石赤茯苓澤瀉椒目料豆皮知柏八味丸寒濕腿痠跗腫痛川桂木熟附子茯苓皮蠶砂川獨活宣木瓜制香附牛膝脾明虛寒腿肚及跗浮腫按指下陷酸冷巴戟肉猺桂香附於朮金狗脊川附子茯苓獨活牛膝宣木瓜淡蓯蓉人參炮姜車前五加皮益智山萸山藥足三陰虛腳背足心跗腫氣逆喘怠水泛為痰熟地虎脛骨杜仲白芍龜版人參熟川附杞子香附牛膝茯苓上肉桂麥冬乾薑陳皮廣沉香五味附桂八味丸疝症章七疝在肝內經謂衝脈為病又謂任脈為病男子結七疝女子帶下鷖瘕同為腎經主之脅中少腹皆肝脈遊行之所氣凝緊為腹聚久結形為瘕疝暴疝多寒久疝多熱素問諸經之疝云任脈為病結七疝督脈生病為沖疝脾傳之腎病名疝鷖三陽為病發寒熱傳為㿗疝邪客於足厥陰之絡令人卒疝暴痛陳參曰少陽上聚為瘕厥陰下結為疝氣衝疝上衝心不得前後能上不能下為沖狐疝夜出晝入如狐乃肝木病㿉癃疝腎脈滑甚為㿉癃疝囊膿血溺秘乃脾邪傳腎也㿗疝頑痹不仁丸大如升如斗厥疝肝木乘脾厥逆上升也疝瘕脾傳之腎少腹實熱而痛狀如黃瓜㿉疝足陽明病㿉疝脈滑為㿉疝乃肝木乘胃也囊大膿血以上系七般疝氣熱鬱於中寒包熱小腹急痛連睪丸導氣湯加荔橘核附姜故破故紙仲青通餐偏墜不痛本腎氣蒼芷滑石半夏加可寬婦人厥陰寒氣聚小兒食積治無難督任陽虛疝氣墜下結升陽為主鹿茸沙蒺藜歸身鹿角菟絲子桂枝奇脈陽虛疝疝瘕繞臍汩汩有聲淡蓯蓉杞子沙蒺藜紅棗小茴香歸身白茯苓筋疝怒勞所傷也淡蓯蓉小茴香歸身胡桃山羊腎補骨脂家韭子茯苓青鹽搗為丸肝疝犯胃納食湧吐宿疝上衝墨附子淡吳萸豬膽汁淡乾薑川楝子濁陰聚肝絡疝臍旁動氣少腹結疝睪丸偏墜淡蓯蓉枸杞子白茯苓安息香歸身小茴香川連川楝子廣木香吳萸延胡索青橘葉桃仁穿山甲炒橘核歸尾小茴香郁李仁山楂泡吳萸小青皮左牡蠣蔥白川桂枝建澤瀉膀胱寒濕凝滯疝氣陰囊莖痛五苓散加防己獨活鬱怒肝疝腫脹用丹溪通陽泄濁法歸鬚橘核小茴香青皮木香炒山梔青蔥川楝子香附小茴延胡索久疝濕邪熱鬱川柏龍膽草山梔蘆薈細辛知母海金砂豬苓澤瀉川連木香冬葵子川桂枝山梔橘核郁李仁川楝子又方肉桂當歸身鹿角川芎小茴炙甘草茯苓生薑羊肉膠為丸疝兼瘧母陰瘧久延邪入肝絡少腹痛漸硬結陰前後處筋痛淡蓯蓉穿山甲杞子歸身大茴香黑川烏水安息鹿茸黑豆小茴香陳參曰疝不離乎肝又不越乎寒以肝脈絡陰器為至陰之臟足太陽之脈屬腎絡膀胱為寒水之經故仲景以溫散祛寒調營補氣為主而子和又以辛香流氣為主胃肝得疏泄乃愈則金鈴子散虎潛丸二法是也喉痹章經云一陰一陽結謂之喉痹一陰者手少陰君火心之脈氣也一陽者手少陽相火三焦之脈氣也夫二經之脈並絡於喉故氣熱則內結結則腫脹甚則痹痹甚死十二經惟太陽別下項其餘皆湊咽喉內經何以獨言一陰一陽以君相二火獨勝則熱且痛矣喉痹總因風熱沖血虛虛火遊行攻更挾風痰喉間客遂有此症腫痛凶緩者祛風與清熱急用桐油探吐松風火上郁喉痹用辛涼清上法薄荷射干大力子杏仁綠豆皮連翹桑皮馬勃絨滑石西瓜翠肺燥熱喉痹北沙參川斛桑葉地骨皮川貝母元參花粉綠豆皮苡仁蘆根枇杷葉百部濁穢上受咽喉腫痹此清降開灌法連翹廣鬱金山梔廣橘皮馬勃大力子杏仁竹葉丸氣分熱毒喉痹銀花馬兜鈴連翹蘆根川貝白金汁通草又方杏仁霜甘草苦桔梗川貝陰虛火炎喉痹日久不愈生地元參雞子黃阿膠麥冬糯稻根鬚又六味丸方內中牛膝蓮子芡實煎丸皆可又復脈湯加天冬牛膝去生薑桂枝又豬膚湯少陰喉痛肌肉消爍下焦易冷骨髓已空用填髓法生羊骨髓豬骨髓鹿角膠等分搗為丸陳參曰喉症古方法治法用辛散咸軟去風痰解熱毒為主如元參升麻湯聖濟透關散及玉鑰匙通聖散普濟消毒飲皆緩本而以治標為急者也恐緩則傷人故急於治標陳曰近時喉痹之證多因失血從水不制火而起治法以滋水斂陽為主宜宗丹溪之說耳病章腎開竅於耳心寄竅於耳耳為清空之竅陽交會流行之所一受風熱火鬱之邪及水衰火實腎虛氣厥者皆致耳鳴失聰耳為腎竅病屬腎腎虛耳聾不能聽少陽脾濕繞耳中邪氣感之耳鳴應濕熱擾胃胃火炎亦致耳鳴紅腫甚右屬陽明左少陽腫而出膿風熱病風溫上郁耳鳴溫邪暑熱火風侵竅用輕可去實法輕清泄降薄荷杏仁通草苦丁茶菊葉荷梗連翹桔梗馬勃綠豆皮銀花川貝羚羊片大力子元參蔓荊子荷葉汁夏枯花滑石鮮竹葉石膏黃芩益元散連翹山梔膽火上郁耳聾頭痛耳脹治法與上略同青蒿丹皮象貝石決明桑葉山梔連翹滁甘菊郁傷心腎膽火上炎耳聾清泄耳嗚病由於郁用煎方以清少陽丸藥以補心腎生地夏枯草山梔生草丹皮女貞子赤苓白芍五味子茯神辰砂磁石建蓮子沉香丸方用熟地龜版麥冬牡蠣氣閉耳鳴連翹川樸木通苦丁茶杏仁廣皮防己鮮荷葉汁腎虛耳聾陰虛陽亢內風上施蒙竅當壯水制陽填陰鎮逆佐以鹹味入陰酸味和陽大熟地瑣陽牛膝磁石萸肉龜板心茯神遠志秋石五味八十高年耳聾且下虛上實當填補下焦六味丸加磁石龜板五味遠志陳參曰耳病治法不外乎通陽鎮陰補心益腎清膽等法體虛失聰治在心腎邪干竅閉治在膽經目病章經云五臟六腑之精華皆上注於目目者肝之竅也肝與膽為表裡肝液膽汁充足目乃能遠視故無論外感內症皆與肝膽有關六淫之邪風火與燥氣居多內起之症肝膽與心腎為多白睛屬肺曰氣輪烏球屬肝曰風輪大小眥心曰火輪上下胞脾曰肉輪瞳神屬腎曰水輪五臟五輪多肝經目得血養視乃明肝有風熱目病生風溫上郁目赤左脈弦桑葉夏枯草連翹草決明菊葉青菊花苦丁茶桑皮料豆衣燥熱目赤且痛鮮荷葉山梔赤芍綠豆皮夏枯草生草菊葉苦丁茶料豆衣薄荷桑白皮連翹暑熱鬱蒸目紅桑葉穀精珠通草綠豆衣米仁望月砂茯苓木火上郁目赤疼腫羚羊片夏枯草桑葉穀精草石決明丹皮綠豆皮米仁連翹炒山梔生地菊葉血絡虛熱眼痛白上紅絲羚羊片連翹川桂枝青菊葉丹皮秦當歸脾肺蘊熱目胞浮腫不飢不運桑皮大腹皮苡米仁通草茯苓廣陳皮生薑皮陰虛火鬱微寒汗出下有痔漏左眼疼六味丸去萸肉加白芍蔓荊子胃虛肝風右眼多淚心嘈雜嫩黃耆歸身煨姜大白芍茯神大棗肝陰虛左目痛熱淚翳膜桑葉望月砂黃甘菊石決明杞子料豆衣赤首烏小胡麻即黑芝麻肝腎虛目痛治法同前熟地歸身茯神白蒺藜萸肉五味菊花柏子仁生地山藥桑椹子大天冬杞子穀精草陳參曰治法外感者必有寒熱頭痛鼻塞骨疼脈見緊數浮洪方可清散內固者如肝膽之風熱盛當散熱除風如腎經之水火衰當壯水益火若陰血雖虧而風熱未盡則當審其緩急相參而治鼻病章經云肺和則鼻能知香臭又云膽移熱於腦令人辛頞鼻淵傳為衄衊瞑目是知初感風寒之邪久則化熱熱鬱則氣痹而窒塞矣衊音蔑鼻出血也無形之氣運於鼻鼻塞聲重風寒被膽熱移腦鼻淵生喜飲鼻赤傷肺氣清邪郁久肺氣窒塞鼻起紅椒當開上宣郁法蔓荊子連翹鮮荷葉苦丁茶滑石香白芷精虛鼻淵腦髓不固淋下無穢氣此勞怯之根也天真丸人參西耆白朮天冬山藥淡蓯蓉當歸羊肉熱壅肺氣知母梨肉貝母煎膏腦熱鼻淵兼左鳴左甚初用苦辛涼散法山梔飛滑石羚羊片苦丁茶夏枯草菊葉連翹久則用鹹降滋填鎮攝法虎潛丸又方大熟地虎骨瑣陽羯羊肉歸身懷牛膝龜版陳皮肥知母白芍加法天冬淡菜豬脊筋口病舌病章口屬脾經舌屬心舌和五味自知音肝熱口酸心熱苦脾熱口甘疳亦生腎熱口咸虛則淡寒亦口鹹食酸明肺熱口辣內熱苦口乾欲飲皆熱因心脾鬱熱曰舌生疳唇赤且燥小生地生甘草麥冬鮮石斛滑石炒山梔生薏米銀花連翹心通草濕溫鬱蒸口舌滿布糜疳唇紅穢氣胃火胸煩淡豆豉犀角尖黑山梔金石斛花粉鮮生地羚羊片淨銀花西甘草川貝青蒿子連翹淡竹葉鬱金鮮葦莖野薔薇花露荷花露枇杷葉露玫瑰露牙痛章牙痛不外風火蟲虛此但言其痛也他如牙宣牙擪牙疳牙菌牙癰穿牙去骨槽風走馬青腿牙疳之類皆由乎濕火熱毒肝鬱濕痰蘊結牙床須分上下二齒辨明手足陽明及少陰之異木生於土牙生床床本陽明牙腎鄉下床嚼物大腸屬上床不動胃經當牙宣腫痛胃濕熱竹葉石膏是主方溫邪上蒸牙疼痛連頭顛用玉女煎法火鬱牙痛連頂顛屬厥陰犀角元參生草連翹夏枯草鈴角知母銀花山梔風熱牙痛齦脹頭痛用輕清泄上法蘆根西瓜翠連翹滑石綠豆皮銀花陰虛火炎牙痛嗜飲牙宣衄血咳血人中白鮮石斛大澤瀉旱蓮草生牡蠣綠豆皮牙痛後絡痹頰車穴閉口不能張用宣通法羚角片煨天麻制殭蠶桂枝尖炒山梔炒丹皮骨槽風痛或緩或甚連空穴脹痛甚心煩先用陽和湯法猺天桂鹿角膠大熟地淨麻黃白芥子甘草走馬青腿牙疳即名牙嘯牙齦出衄紫色口臭脈反澀細兩腿青如靛此濕熱鬱火蘊結陽明肝腎陰虧犀角石膏知母懷牛膝銀花元參鬱金生地熟地丹皮人中白麥冬旱蓮女貞子連翹碧玉散茯苓龜版心炒山梔羚羊片生草川石斛川貝安南桂料豆衣
