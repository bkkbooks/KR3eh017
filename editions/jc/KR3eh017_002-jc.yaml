body:
  text: 卷中雜症痞塊積聚章滿而不痛謂之痞滿而痛者即是結結者積聚有餘因痞者中氣不足致一消一補誠分明脾氣素虛者自異補則積滯邪愈深消則土傷虛愈至消補相兼養正宜枳實之丸為主治不動為癥動為瘕瘕假癥真有妙義右脅食塊菔曲草草果左脅血塊芎桃桂痰塊在中海石須栝蔞白茯檳榔備壯健亦用青稜蓬瘦弱參耆少許配香砂青陳可共加蘇梗當歸薑棗類婦人有塊俱死血莫將痰食為疑似痰熱內閉豆豉山梔枳殼菖蒲杏仁半夏鬱金栝蔞川連白金丸白礬熱邪里結枳實白芍橘皮烏梅杏仁瀉心湯有三生薑乾薑半夏人參甘草黃芩川連大棗人參甘草乾薑半夏大棗黃連黃芩人參半夏黃芩黃連人參甘草乾薑大棗熱邪入厥陰吐蛔消溫瀉心湯去人參甘草加枳實白芍氣閉化熱栝蔞鉤藤白蔻鬱金橘皮白蒺藜山梔蘇梗桑葉杏仁麻仁綠豆殼暑邪阻氣竹茹黃芩知母桔梗麻仁鬱金半夏滑石枳殼保和丸神麯山楂半夏連翹廣皮卜子茯苓濕阻熱分半夏茯苓杏仁橘皮烏藥廣藿良薑鬱金白蔻中陽不運桂枝藿香乾薑半夏厚朴茯苓草果附子廣皮胃寒滯涎吳萸乾薑川楝子半夏茯苓廣陳皮胸次清陽不運宗仲景轉旋胸次之陽苓桂朮甘湯寒熱客邪互結姜炒川連半夏黃芩淡乾薑枳實陳曰古人治痞不外以苦為泄辛甘為散二法外感如仲景瀉心湯內傷如仲景苓桂甘姜法上焦不舒枳桔杏蔞開降梔豉除熱化腐疏暢清陽之氣法古人有形至無形妙論也木犯土虛中挾滯川樸茯苓白芍廣皮益智丁香人參半夏川楝吳萸薑汁牡蠣濕熱食滯茅朮廣皮白芍萊菔子白朮黃芩枳殼雞內金痰凝脈絡右脅有形高突按之不痛白芥子栝蔞蛤粉山梔廣鬱金橘紅姜皮半夏血絡凝痹歸鬚木通益母草蜣螂䗪蟲香附延胡小青皮韭白鬱金川樸枳殼茺蔚子川芎橘核單桃仁陳曰積為血傷入絡必仗蠕動之物以搜逐病根初為氣結在經久則血傷入絡經絡繫於臟腑外廓仲景於勞傷血痹通絡方法每取蟲蟻飛走諸靈伏梁病亦在絡也積為陰邪聚絡大旨當以辛溫入血絡治之蓋所以容此陰邪者必無陽動之氣以旋運之而必有陰靜之血以倚仗之故必仗體陰用陽之品方能入陰出陽以施其辛散溫通之妙張景岳云心之積名伏梁起臍上大如臂上至心下令人煩悶脾之積曰痞氣在胃脘覆大如盤令人黃疸肺之積曰息賁在右脅下覆大如杯令人灑淅寒熱喘咳肺壅肝之積曰肥氣在左脅下如覆杯有頭足令人發咳腎之積曰奔豚發於少腹上至心下若豚或攻上攻下無時令人喘逆骨蒸少氣陰氣所積曰積陽氣所聚曰聚積者五臟所生聚者是六腑所生也嘔吐噁心章胃司納食主乎通降其何以不降而反上逆嘔吐者多由肝氣衝逆阻胃之降而然也故靈樞經脈篇云足厥陰所生病者胸滿嘔逆況五行生剋木動必犯土胃病治肝隔一之治也凡嘔吐青黑必系胃底腸中逆瀉而出乾嘔即噦有聲吐有物聲物兼有吐斯實吐輕嘔重乾嘔凶嘔乃漸出吐頻出不嘔不吐為噁心總是胃虛不能食胃中有火膈有痰降火調氣治痰適平胃散可加減投橘半竹茹湯亦得煩渴脈若洪數來黃芩竹茹山梔該吐水冷涎沉遲脈乾薑肉桂吳萸偕嘔吐痰沫脈洪滑南星苓朮門冬裁水停心下聲汩汩茯苓澤瀉豬苓入飽悶作酸暖氣升食傷麥曲檳榔及及病不食脈細微茯苓人參與白朮酒傷白蔻瀉葛花添傷風合用紫蘇葛根痰飲嘔吐都是濁陰所化陽氣不振勢必再熾仲景以溫藥和之肝犯胃溫膽湯陳皮半夏茯苓甘草枳實竹茹合左金丸川連吳萸安胃丸旋覆代赭石湯旋覆花代赭石人參半夏甘草生薑大棗厥陰濁逆治法同上胃陽虛濁陰上逆白朮川樸益智半夏茯苓薑汁苓薑朮桂湯加川樸川椒黃連附子粳米中陽虛人參附子半夏砂仁乾薑白朮炙草茯苓川椒大棗陽虛吸受穢濁氣人參木香廣藿川樸廣皮丁香茯苓煨姜砂仁肉果益智肝腎虛衝脈氣動蓯蓉上肉桂沙蒺藜茯苓杞子鹿角霜當歸身嘔傷胃中邪熱劫津溫膽湯去甘草加山梔豆豉薑汁邪熱內結半夏瀉心湯去薑棗加枳實山梔杏仁薑汁暑減內結治法同上肝火刑金桑皮丹皮蘇子山梔枇杷葉鬱金栝蔞橘紅杏仁竹瀝沙參麥冬豆豉溫熱結於厥陰身熱肢冷神昏嘔吐厥逆險症川連半夏乾薑山楂滑石石菖蒲黃芩枳實廣皮竹心連翹綠豆皮痰涎呃逆續嘔黑汁傾囊危症此由胃底腸中渾淆而出真西甘草四兩熬濃服之呃停嘔止可救吐蛔蛔與蛔通古人以狐惑蟲厥都是胃虛少谷之故仲景之蛔蟲厥都從驚恐得之延胡蘆薈吳萸枳實茯苓人參細辛紅棗安胃丸半夏瀉心湯理中湯加栝蔞香附川椒旋覆代赭湯加白芍附子噎膈反胃章經云三陽結謂之膈一陽發病其傳為膈丹溪謂噎應反胃多由氣血兩虛而成噎膈多由喜怒悲憂恐五志過枉或縱情嗜欲恣意酒食致傷氣內結陰血內枯而成治當調養心脾以舒結氣填精益血以滋枯燥反胃乃胃中無陽不能容受食物命門火衰不能熏蒸脾土以致朝食暮吐暮食朝吐治宜益火之源以消陰翳補土通陽以溫脾胃噎膈之症多因火熏蒸津液成痰阻七情妄動五臟傷陰血漸槁無生所咽喉通塞不能食病起賁門上焦膈中膈飲食得水入食下半日又吐出下膈飲食如平人朝食暮吐渾無力治主加味二陳湯韭汁牛乳服之適血虛四物氣四君子湯痰飲瀝貝栝蔞應瘀血歸尾桃韭汁氣急檳術沉香吞便結大黃合四物桃仁蘇子蔞麻仁反胃為輕噎膈重三陽熱結精血空薄味勤藥靜養之香草之品切忌用陳曰按經云味過辛熱肝陽有餘肺津胃液皆奪為上燥陽氣結於上陰氣衰於下為關格附子瀉心湯附子黃芩川連大黃大半夏湯半夏人參白蜜加黃連薑汁進退黃連湯人參川連桂枝枳實竹瀝枇杷葉杏仁乾薑茯苓半夏薑汁肝陰傷胃汁枯陳參曰酸甘濟陰胃屬陽土宜涼宜潤肝為剛臟用柔則和酸甘兩濟其陰人參烏梅生地阿膠杏仁玉竹川貝天冬麥冬白芍胡麻梨汁柿霜煩勞陽亢肝胃津液枯清燥救肺湯生地麥冬黑芝麻杏仁柏仁白蘇子松子為汁熬膏末丹溪法胃陽虛陳參曰胃氣下行為順積勞傷陽治宜通補清利苦降辛通利痰清膈大半夏湯半夏人參白蜜外臺茯苓飲貝前吳萸理中湯即理中湯加吳萸益智新會栝蔞杏仁竹茹茯苓附子枳實豆豉粳米竹瀝薑汁川連鬱金丁香皮憂鬱痰阻川連茯苓半夏杏仁橘皮栝蔞薑汁竹瀝桔梗枳實肝鬱氣逆並通厥陰陽明半夏茯苓薑汁杏仁橘皮竹瀝液虧氣滯半夏枳實枇杷葉茯苓竹瀝肺胃氣不降陳曰輕劑清降苦辛寒開肺杏仁鬱金栝蔞枇杷葉山梔豆豉酒熱鬱傷肺胃川連枳實豆豉紫菀桃仁白蘇子半夏杏仁鬱金茯苓薑汁枇杷葉陽衰脘痹血瘀桃仁紅花延胡半夏鬱金蔞仁橘皮人參茯苓益智歸身薑汁制軍枳實川連韭白汁吞酸吐酸章飲食入胃脾不逆濕熱相蒸為酸病吐出酸水名吐酸吐不出口吞酸認此而不藥漸噁心反胃噎膈日漸進吐因津液氣隨升鬱積已久濕熱甚乃從火化木火也遂作酸病屬於熱分明應吞應積熱在內藏酸水釀成寒束定外寒束之難外行心胃之間作酸甚二陳湯越鞠丸主治之寒用吳萸熱連進再戒忿怒以平肝滋味薄時胃清淨水腫章腫本乎水脹由乎氣水分陰陽外來者為有餘即為陽水其或固大病後脾肺虛弱不能通調水道或因心火剋金肺不能生腎水致小便不利或因腎經陰虧虛火爍肺金而溺少誤用行氣分利之劑致喘急痰盛小水短少釀成腫症此內發者為不足即為陰水人之生兮資水穀脾主谷兮腎水屬水旺土虛不勝水水氣泛溢浮腫肉實脾飲於陰水宜便利不渴而腫脹者為陰水也陽水舟車丸可錄舟車丸宜慎用口渴面赤氣阻便秘而腫脹者為陽水也上為風腫麻防要下屬濕腫苡防己足又有虛症氣血分四物湯兮合四君朝寬暮急血虛病暮寬朝急氣虛成先脹後喘用二術蒼白朮先喘後脹加麥冬苓水脹總由濕熱積滲道少通遂閉塞邪水隨氣注絡中甚至唇腫臍突出唇腫臍突者死症雖云濕勝實脾虛大法補中最有益舟車丸甘遂大戟大黃黑醜芫花輕粉橘皮青皮木香實脾飲見前脾胃陽虛腑陽不行人參茯苓益智白芍白朮歸身廣皮附子砂仁檳榔炮姜草果肉果川樸腎胃陽虛腎氣丸五苓散人參乾薑茯苓附子菟絲葫蘆巴剛人參乾薑製半夏枳實木火犯胃川樸山梔楂肉川楝子白芍川椒枳實鐵鏽水逍遙散去白朮合左金丸濕壅三焦肺氣不降宜清肅上焦治之蜜炙麻黃杏仁紫菀苡仁茯芩皮枇杷葉石膏前胡姜皮川通草木鬱氣滯血滯便澀通幽法川楝橘核桂枝香附桃仁當歸小荷柔葉楂肉鉤藤延胡神麯丹皮禹餘糧丸濕滯凝滯小溲不行當開太陽川樸川椒乾薑牡蠣漢防己橘核桂木五味通草海金砂寒水石五苓散濕鬱兼熱苦辛通腎半夏瀉心湯見前下焦寒熱流經辛香通經府之郁生於術北細辛川獨活炮川烏漢防己白茯苓氣血鬱積兼挾濕熱清理相火健運中州小溫中丸濕熱寒水之氣交橫氣喘溺少崇土製水暖下泄濁禹餘糧丸肝脾不和兼挾暑邪半夏廣藿川樸甘草茯苓山楂鬱金脾胃不和清陽痹結以滑潤治之栝蔞川楝桂木生薑桃仁薤白延胡歸鬚半夏茯苓膨脹章經云濁氣在上則生䐜脹太陰所至為臌脹即腹脹病能篇云驟脹屬熱膨脹水腫一原病皆是脾虛不得運氣入於臟膨脹成腹大身瘦食不進實土分消是妙方二苓二術陳皮香木香香附樸砂桑澤澤瀉腹皮沉香磨汁兼水姜腹實痛塊紅筋系血臌歸芍紅花丹皮嘗水臌水腹若秘結五苓散加腹皮入食積臌脹大腹凝檳牽牛菔子稜蓬朮氣實臌脹或吐酸脅肋痛脹並面黑分心氣飲羌桂苓夏通青皮桑腹甘蘇梗芍氣虛脹滿勞役來氣急溏泄元氣衰補中益氣湯必用分條而治休疑猜地氣為雲天為雨大地下變否為臌脾土之陰既受傷轉運之司亦失所胃雖受谷不運行清濁相淆隧道阻鬱而為熱熱為濕濕熱相生病即取此病宜補不宜攻燥濕補中是為主陳參曰氣陷則跗腫氣呆則脘悶又曰木乘土位清陽不得舒展濁氣痞塞而攢踞也又曰虛腫脹由足入腹治在少陰腎太陰脾脾陽單脹宜健陽運濕溫通脾陽五苓散見前紫樸陳廣皮木瓜人參炮姜大腹皮附子煨草果草蔻益智蓽茇茅朮乾薑川桂木川椒腎氣加減八味丸濟生腎氣丸養陽明大半夏湯半夏人參白蜜陳參曰衝脈隸於陽明胃陽傷極中乏坐鎮之真氣衝脈動則諸脈皆震動濁陰散漫由此臥著欲立矣疏厥陰逍遙散當歸白芍柴胡茯苓白朮山梔甘草生薑薄荷加味丹皮何書田曰六腑為陽以通為補通陽則濁陰不聚守補恐中焦易鈍喻嘉言謂能變胃而不受胃變臟寒生滿病燥暖水臟之陽是培火生土法喘脹要旨開鬼門以取汗潔淨府以利水無非宣通表裡經云從上之下者治其上又云從上之下而甚於下者必先治其上而後治其下古語云膏粱無厭發癰疽淡泊不能生䐜脹虛損發熱諸症章久虛不復謂之損損極不復謂之勞元無所歸則熱灼勞力傷陽酒色傷陰又云陰復及陽最難克復陰虛懨懨腎陽竭午後發熱少飲食數天無力脈象明乾咳失血盜汗出陽虛汗出並頭疼脈細遲弱午前熱陰虛血虛腎精虧陽虛氣虛勞倦得陰虛四物苓柏丹二冬柏仁味五味龜版知母甘草清骨散可骨蒸用棗仁耆朮自汗堪咳嗽氣急桑貝菀栝蔞貝母治有痰見血膠阿膠沙參丹參菀紫菀角犀角泄瀉山藥苓薏添盜汗浮麥堪益伍牡蠣黑豆用之妥衄血梔芩茅草根聲啞喉乾粉花粉桔桔梗可陽虛益氣與補中散火升陽亦得所外感寒傷陽則虛陽虛陰盛虛損初此損自上而及下一損於肺皮毛枯二損於心血脈少不能榮於臟腑女則月事不通三損於胃宜急圖遇於胃則不治矣感熱傷陰陰則虛陰虛陽盛損卻殊此損自下而及上二損於骨痿徂腎不能起床一損於肝筋即憊三損於脾速當扶飲食不化過於脾不治之症陰虛復脈湯六味丸陽虛人參鹿角霜歸身西枸杞茯苓五味淡蓯蓉懷藥沙苑子陰虛陽浮宜介類潛陽鎮逆填下陽虛奇脈兼病鹿角沙苑子杞子菟絲子蓯蓉柏子仁歸身陰陽兼虛熟地西耆歸身淡蓯蓉青鹽鹿角茯苓杞子五味子八味丸復脈湯上損及胃麥冬生地熟地人參女貞枸杞扁豆茯苓甘草五味山藥建中湯去生薑下損及中八味丸加減異功散建中湯鹿角菟絲子杞子家韭子胃虛嘔瀉人參赤石脂炒粳米烏梅新會皮陰虛陽浮兼胃陰虛生地人參扁豆麥冬炙草茯苓脾腎兼虛人參煨益智廣皮茯苓沙苑子五味資生丸加坎氣濟生腎氣丸加茯苓菟絲勞傷心神歸脾湯白朮人參西耆歸身茯神遠志棗仁木香龍眼甘草生薑大棗中虛當用胃藥坐鎮中宮用四君子湯人參白朮茯苓甘草春麥門冬湯麥冬半夏甘草大棗人參粳米夏生脈散人參麥冬五味小建中湯桂枝甘草白芍生薑大棗飴糖加黃耆又十四味建中湯腎氣不納人參菟絲子茯苓坎氣五味子胡桃氣血滯升降阻用旋覆花湯旋覆花青蔥新絳加桃仁歸鬚蔞皮衝任皆虛紫河車大熟地云茯神淡蓯蓉五味子川黃柏勞力傷脾胃用霞天膏勞動傷經脈歸身蓯蓉沙苑杞子茯苓川芎何書田曰煩勞傷氣宜治上治中甘涼補肺胃之清津柔劑養心脾之營液或甘溫氣味建立中宮不使二氣日偏營衛得循行之義縱欲傷精當治下而兼治八脈又須知填精補氣之分益火滋陰之異或靜攝任陰溫理奇陽陳參曰腎虛氣攻於背肝虛熱觸於心宜血肉有情重鎮以理其怯填補以實其下形不足者溫之以氣精不足者補之以味失血章心生血兮肝藏血隨處而行無處缺目視舌言耳能聞足能步履手能攝如何錯過致妄行勞傷火動因而得吐因肺胃即熱蒸逐口吐出隨火升嘔或醉怒或勞役胃口之血無端行咯血之血出於腎陰火上炎殊分明咳衄肺金心火克咳者為重衄為輕犀角地黃湯主理歸骨地骨梔芩麥知杞側柏藕汁共茅根童便服之浮火已咳嗽沙參天麥冬寒熱龜甲青蒿庸有痰貝蔞花粉入有瀉藥山藥苡苓甘同不止失血不止蒲黃炒荊芥韭汁大黃去紫塊血不藏室體極虛八珍可用阿膠配陳參曰內經分上下失血為陽絡陰絡是腑絡取胃臟絡取脾治血先理腑胃甘涼肅降法沙參玉竹花粉鬱金茜草綠豆皮麥冬桑葉川斛杏仁竹心又治心營輕清滋養法生地丹參地骨皮連翹元參山梔生粉草風淫津涸甘寒法蘆根薄荷羚角蔗汁溫淫火壯苦寒法石膏黃芩山梔杏仁暑遍氣分開解法滑石蘇梗杏仁橘白薄荷苡仁白蔻暑逼營分清芳法犀角生地青蒿山梔銀花丹皮連翹以上外因嗔怒傷肝陽血隨氣逆用膠耆氣為血帥法白蘇子鬱金丹皮鉤藤丹參降香川貝母杏仁桑葉橘紅蒺藜鬱勃傷肝陰木火內燃陽絡柔肝育陰法阿膠麥冬白芍藥生地甘草雞子黃煩勞損心脾氣不攝血甘溫培固法用歸脾湯見前保元湯人參黃耆肉桂甘草縱欲傷腎青鉛六味丸肉桂七味丸並加童便精竭海空氣泛血湧危症急固真元大補血法人參五味子紫河車熟地枸杞子紫石英以上內因煙辛爍肺治上法用千金葦莖湯鮮葦莖苡仁桃仁瓜瓣加茅根酒熱戕胃治中法用甘露飲生地熟地天冬麥冬石斛茵陳黃芩枳殼甘草枇杷葉加藕汁墜墮傷瘀血泛先導下後通補怒力傷屬勞傷之根陽動則絡傷血溢治與虛損有間宜滋陰補氣為主用當歸建中湯即小建中湯加當歸虎潛丸旋覆花湯何書田曰血之主司繫心肝脾血之生化系陽明胃胃為血之要道當先治胃仁齋直指云一切血證經久不愈每以胃藥收功薄味調養胃陰如金匱麥冬湯及沙參扁豆鮮斛茯苓甘溫建立中陽如人參建中湯及四君子加減沉著濃厚屬肝腎之血用熟地枸杞歸身牛膝茯苓青鉛陰虛陽升頭中微痛當和陽鎮逆用生地阿膠牛膝白芍茯苓青鉛思慮太過吸傷腎陰時時莖舉此失血屬驕陽獨升用人中白龜版知柏等味心火吸腎隨陽升騰陽翔為血溢陽墜為陰遺腰痛足脛冷何一非精奪下元損見症治以人參熟地河車膏紫石英茯苓五味枸杞沙苑謂莫見血以投涼勿因嗽以理肺為要旨耳腎傳脾胃元海無納氣之權急急收納根蒂人參河車膏坎氣枸杞熟地五味沙蒺藜茯苓胡桃等味在所必用陳參曰夏月藏陰冬日藏陽陽不潛伏升則血溢降則遺精血宜寧靜不宜疏動動則有血溢之虞投涼劑則清氣愈傷附衄血治法溫邪四季皆有因病衄血宜用辛涼清潤法杏仁淡芩山梔鬱金元參連翹風溫春令元參赤芍連翹桑葉丹皮橘皮茅花酒熱傷胃生扁豆麥冬北沙參粳米濕熱胃火上蒸出衄玉女煎熟地知母生石膏麥冬牛膝膽火上升心營熱兼衄犀角生地丹參知母牛膝側柏葉元參連翹山梔丹皮荷葉陰虛陽冒致衄生地龜版阿膠麥冬生白芍川柏牛膝天冬茯苓川石斛人參山藥熟地丹皮澤瀉石決明蓮子芡實元參山萸補骨脂淡菜便血章便血不外風淫腸胃濕熱傷脾二義內經謂是陰絡受傷陰絡即臟腑隸下之絡也溺血鬱熱由膀胱五苓散合蓮子湯知柏山梔皆可入不痛為虛益氣良玉莖中不痛可用補中益氣湯下血大腸多濕熱腸風臟毒清濁譯糞前近血熱在下糞後遠血熱上臧四物荊槐榆悉妙棕灰陳皮殼枳殼苓甘襄發熱柴胡膠龜版效血虛熟地血餘嘗瘀塊桃紅丹尾鱉延胡赤芍同前方濕熱荊芥炭川連烏梅廣皮茅朮地榆甘菊炭黃芩白芍川樸槐米於朮茯苓桑葉澤瀉丹皮陽虛寒濕茅朮廣皮炙草柴胡人參附子川樸炮姜升麻地榆茯苓防風根白芍荷葉建神麯葛根大腸血熱生地地榆炭黃柏料豆皮柿餅山梔丹參炒樗皮槐花炒黃芩丹皮元參五加皮當歸炒銀花白芍脾胃陽虛下血如注四君子湯加木瓜炮姜禹糧石脂丸陰傷腸胃生地丹皮竹心茯苓補陰丸元參連翹天冬牛膝虎潛丸陰虛血澀肛墜掣痛肛門若火烙陽不和平仍是陰精失涵生地炭火麻仁歸鬚冬葵子料豆皮查炭脾腎虛六味丸加芡實五味子蓮肉歸脾丸腎陽虛人參蓯蓉補骨脂柏仁韭子鹿茸鹿角巴戟天遠志肉茯苓熟地菟絲子歸身腎陰虛熟地龜版心歸身知母山藥山萸料豆皮白芍茯神地榆丹皮五味子烏梅花龍骨勞力絡傷瘀必結於絡絡及腸胃而後下乃一定之理人參陝當歸茯苓炙草大白芍肉桂血瘀在絡歸鬚旋覆花柏子仁桃仁新絳青蔥管陽明不闔人參炒川柏山萸肉赤石脂烏梅禹餘糧五味子白粳米清心蓮子飲人參柴胡黃芩地骨皮車前子黃耆茯苓甘草石蓮子麥門冬何書田曰便血一症古有腸風臟毒脈痔之分其實不外乎陰絡受傷也能別其血之遠近而決其臟腑之性情則不致氣失統攝血無所歸如漏卮不已耳肺府致燥澀宜潤降如桑麻丸及天冬地黃銀花柿餅之類心病則火燃血沸宜清化如竹葉地黃湯及補心丹之類脾病必濕滑宜燥升如茅朮理中湯及東垣益氣湯之類肝病有風陽痛迫宜柔泄如駐車丸及甘酸和緩之劑腎病見形消腰拆宜填補如虎潛丸及理陰煎之類至膽經為樞機逆則木火煽營宜桑葉山梔丹皮之清養大腸為燥腑每多溫熱風淫宜辛涼苦燥胃為水穀之海多氣多血臟病腑病無不兼之宜和宜補應熱應寒難以盡言脾胃為柔臟可受剛藥心肝為剛臟可受柔藥羅謙甫治便血以平胃散作主加桂附乾薑重加炒地榆以收下濕頗見神效溫煦奇腎用斑龍丸疏補中土用枳朮丸守補心脾用歸脾丸脾濕腎燥用黑地黃丸大補精氣用天真丸升降脾胃用平胃散堵截陽明用禹餘糧赤石脂丸復從前之湯液用五仁湯善病後之元虛用養營湯汗症章經曰陽加於陰謂之汗又曰汗者心之液又曰腎主五液故凡汗症未有不出心腎虛而得者夫心為生陽之臟凡五臟六腑表裡之陽皆心主之以行其變化故隨其所在之處而氣化為津亦隨其火擾所在之處而泄為汗是汗本乎陰乃津液之所化也克肖天地名曰人天地有雨人汗生時逢久雨天地否久汗之人病自成覺來無汗寐時出盜汗陰虛兼內熱不動而汗時時來自汗陽虛兼有濕脈細陽弱太陰虧自汗補陽調胃戢戢者絕其汗也浮麥地芍陳蠣梅加減歸脾服多帖盜汗滋陰降火宜當歸大黃功最奇麻黃根兼知母杞枸杞骨前方選用堪同施寧神安心藥為妙汗為心液當先知衛陽虛宜鎮陽理陰陳參曰火與元氣不兩立氣泄為熱為汗以治在無形實火宜清虛火宜補真武湯茯苓白芍白朮附子生薑玉屏風散黃耆防風白朮人參附子西耆於朮人參茯苓炙草浮小麥半夏牡蠣南棗營衛虛自汗黃耆建中湯加防風根勞傷心神生脈散四君子湯胃陰虛人參茯神棗仁白芍炙草龍骨陽虛自汗補氣以衛外陰虛盜汗補陰以營內柏子仁丸柏仁牛膝卷柏澤蘭續斷熟地陳參曰津散於外而為汗此為虛者言若時證則不可拘泥也心之陽虛不能衛外而固密則外傷而自汗腎之陰虛不能營內而退藏則內傷而盜汗自汗由陰蒸於陽分也盜汗由陽蒸於陰分也頭痛章頭為諸陽之會與厥陰脈會於顛諸陰寒邪不上逆惟陽氣窒塞濁邪得以上據厥陰風火乃能逆上作痛頭痛症皆由清陽不升風火乘虛上擾所致也頭痛之症雖主風亦有痰火虛不同頂顛屬風太陽火眉稜骨痛由痙攻腦後血脈虛來大滑痰弦數火風逢九味羌活湯主治芩連治火殊多功痰合二陳虛四物氣血四君亦可庸用也風亦屬陽頭為會諸陽之會兩陽相爭痛勢凶氣血虛者無力拒風不與爭痛故松若因痰飲作痛者胸膈飽悶非風從風火頭痛宜辛散輕清法羚羊片元參薄荷山梔桑葉夏枯草連翹丹皮菊葉黃芩苦丁茶荷葉木通蔓荊子白芷肝風頭痛宜熄風滋肝法首烏枸杞子生地菊花白芍料豆衣柏仁夏秋伏暑頭痛石膏連翹羚羊片蔓荊子木通山梔苦丁茶荷葉邊飛滑石生草紫川樸桑葉膽胃伏邪羚角片菊葉連翹葛根牛蒡子赤芍白芷凡頭痛而屬陰虛陽越者用復脈湯甘麥大棗法加阿膠牡蠣生地白芍沙參因陽虛濁邪阻塞氣血瘀痹而痛者用蟲類搜逐血絡宣通陽氣炮川烏半夏細辛生薑汁露蜂房川芎當歸炙全蠍陳參曰頭風初起以桑葉山梔丹皮荷葉邊輕清涼泄使少陽內遏之邪倏然而解若久則傷及肝陰參入酸涼柔劑可也或肝陰久耗厥陰無一息之寧痛掣之勢已極此豈輕劑可解惟復脈湯之純甘壯水膠芍之柔婉以熄風和陽庶足俾剛亢之盛一時頓息心痛章心痛從來類分九胃脘疼痛當心口風熱悸冷飲食蟲疰與去來痛皆有得暖緩時屬於寒前後應痛因郁久血痛逆氣唧唧聲痰痛脈滑吐痰垢噁心惡食因食傷𩞄雜喜飢胃火誘口吐黃水是蛔蟲時作時止痛止能食者悶痛吐寬郁痰厚初起得寒溫散之姜半夏香砂青皮廣皮蔻仁稍久或鬱郁火生曲六曲殼枳殼苓梔滑石芎川芎守痛則不通郁自成通則不痛便無咎驚傷心痛聞雷或炮被驚心下漾漾作痛此肝陽上逆不容升達也養血平肝治之逍遙散去柴胡加鉤勾丹皮積勞損傷心痛勞傷血痹痛極昏厥宜通絡和營法生鹿角官桂半夏當歸鬚桃仁薑汁脾寒厥痛吐涎肢冷病在脈絡宜辛香開通法高良薑片薑黃草果生茅朮丁香梗川樸心勞受傷作痛重按而痛減者攻劫難施宜用辛甘化陽良法人參川椒白蜜桂枝炙草陳曰心痛寒甚用炮薑肉桂火甚用炒川連竹茹如因瘀血用桃仁泥延胡索五靈脂當歸鬚痰飲用制南星栝蔞蟲厥用椒目烏梅使君子若真心痛十指甲俱青夕死旦危不治腹痛章腹痛之症芍藥甘甲乙化土方須諳蒼術樸白術苓香附枳實白芷用藥堪與心痛參虛者手按痛止軟手不可近是實焉寒痛綿綿小腹冷火痛時作時止然痛處不移瘀血聚或東或西氣攻堅痰則脈滑小便秘怒痛肝傷兩脅連血虛偎偎筋抽引氣虛呼吸少氣綿瀉後痛減知食積燥濕導滯湯為先冒暑吐瀉香薷需傷濕木通茅朮痊上中二焦氣阻腹痛嘔吐脈數而澀半夏白蔻山梔豆豉廣皮桔梗陽氣不運腹痛兼腰痛冷則尤甚桂枝香附小茴香艾絨青皮白茯苓郁傷脾陽作痛半夏延胡索生薑蘇梗川樸川楝子草果穢濁阻氣腹痛用芳香逐穢法藿香萊菔子川樸半夏廣皮白杏仁陰濁內阻腑陽不通用通陽泄濁法生曬術附子茯苓小茴香制川樸淡吳萸良薑半夏生益智生薑汁肝氣鬱而腹痛逍遙散去白朮加鬱金香附郁久血滯癸水不調痛而無形肉桂香附吳茱萸木香當歸川芎五靈脂白芍鬱怒飲氣入絡制南星牡蠣桂枝川楝子橘核東引李根皮暑傷中氣作痛人參廣皮益智仁穀芽白芍茯苓郁傷肝脾絡血瘀凝用宣達營絡法治之桃仁老韭白歸鬚桂木穿山甲阿魏丸當歸白芍甘草制軍枳實桂枝勞傷中陽腹痛浮腫食入痛甚當歸益智煨姜棗肉白芍廣皮炙草陳曰營分虛寒當臍而痛冬發春愈加肉桂茯苓脅痛章脅痛多屬少陽厥陰傷寒脅痛皆在少陽膽經以脅居少陽之部耳雜症脅痛皆屬太陰肺經以肺脈布於肝絡耳脅與肋屬肝膽部肝主藏血又主怒凝血成瘀疼痛加鬱怒不舒痛則布怒痛且膨得噯寬血痛不臌無時住痛連胃脘挾宿食右脅氣滯濕痰注逍遙四物小柴胡樸果青砂二蘇葉梗附熱須黛青黛膽膽星痰芥星健脾二陳亦可付肝鬱脅痛川楝子山梔橘葉川連茯苓降香末半夏川斛牡蠣香附夏枯花白芥子濕熱壅滯脅痛小溫中丸金不制木咳血後脅痛川貝母杏仁白蔻仁枇杷葉橘紅降香末營絡虛寒重按得緩屬陰絡虛也桂乾薑小茴香大棗歸身茯苓炙甘草寒入絡脈氣滯脅痛口吐涎沫身發寒慄半夏川楝子吳萸高良薑茯苓延胡索蒲黃蓽茇血絡瘀痹用辛泄宣瘀法陳參曰進食痛加大便燥結久病已入血絡桃仁泥川楝皮鬱金新絳當歸鬚延胡索丹皮五加皮山梔皮柏子仁冬桑葉左牡蠣肝腎陰虧五心熱咽痛左脅疼陳參曰宜甘緩理虛溫柔通補方法生地天冬柏子仁人參麥冬生白芍肝胃皆虛脅痛人參棗仁柏子仁桂元茯神當歸花龍骨金箔脅痛兼痰飲半夏白蒺藜鉤藤廣皮茯苓白芥子甘草風入絡脅痛易飢吐涎生地白芍天冬杞子桃仁阿膠柏仁丹皮澤蘭膽絡血滯脅痛上吐下瀉春深寒熱不止青蒿鬱金元紅花丹皮歸鬚澤蘭葉陳參曰治脅痛症不外仲景旋覆花湯河間金鈴子散以及辛溫通絡甘緩理虛溫柔通補辛泄宣瘀等法內經肝病三法治虛亦主甘緩況病必傷陽明胃絡漸歸及右肝腎同病矣當用甘味人參茯苓甘草大棗佐鎮攝金箔龍骨治之腰痛章膝腿足痛附先天之本惟兩腎位在腰間精足甚房勞太過致精虧邪氣客之腰受病六味可增附斷川斷龜補骨杞味仲柏知一切寒藥皆禁用婦人血滯更血虧太陰腰痛因濕熱芩柏仲芎蒼白朮日輕夜重瘀不通歸尾桃紅赤芍膝牛膝沒沒藥身寒即發寒炮姜桂肉桂痰積二陳風小續小續命湯閃氣腎離法同瘀又有腎著治宜速便利身重腰冷水利濕苓甘薑朮足濕鬱腰痛防己茯苓皮杏仁草果苡仁桂枝川樸晚蠶砂萆薢滑石菊花小茴寒濕傷陽腰痛宜辛溫通陽泄濁法杜仲杞子五加皮茯苓歸身牛膝炒白芍炙草胡桃大棗沙苑子羊腎煨姜川桂枝濕傷脾腎之陽腰痛嗜飲便澀遺精痛麻木用祛濕緩土法苓桂術薑湯術菟丸老年奇經病腰痛用血肉有情之品溫養下焦鹿角霜淡蓯蓉淮牛膝柏子仁炙虎骨猺肉桂西杞子川杜仲川石斛如麻木甚者加萆薢蒺藜陳參曰腰者腎之府腎與膀胱為表裡在外為太陽在內屬少陰又為沖督任帶之要會則腰痛不得專以腎為主病內因治法腎藏之陽有虧則益火之源以消陰翳用附桂八味丸腎藏之陰內奪則壯水之主以制陽光用知柏八味丸外因治法里濕傷陽用辛溫以通陽泄濁濕鬱生熱用苦辛以勝濕通氣不內不外因治法勞役傷腎以先後天同治傾跌損傷辨其傷之輕重與瘀之有無為或通或補膝腿足痛附溫濕熱蒸阻流行之隧宜宣通之石膏杏仁生苡仁威靈仙滑石防己寒水石足膝腫痛久不止內熱生虎骨仙靈脾淮牛膝金狗脊陝歸身川萆薢右腿痛不腫入夜勢篤此邪留於陰治從肝經杜仲小茴香穿山甲歸鬚北細辛乾地龍足痛攻衝吐涎大拇指疼吳萸獨活歸身附子細辛防己兩足皮膜撫之則痛此厥陰犯陽明胃也川楝子小青皮歸鬚橘紅延胡索炒山梔桃仁查肉飽食則噦兩足骨髓皆痛此陽明不克司束筋骨用轉旋陽氣法苓桂術薑湯陳參曰腿足痛外感者推寒濕濕熱濕風之流經入絡內經云傷於濕者下先受之以治濕為主或佐溫佐清佐散為宜若內傷不外肝脾腎三者之虛或補中或填下或養肝為治臂背痛章背者胸中之府肺俞為病即肩背作痛又背為陽明之府而陽明為十二經之長虛則不能束筋骨利機關即肩垂背曲而臂亦作痛矣陽明脈衰肩胛筋衰不舉而痛楚也手臂因何作疼痛經絡血虛風濕中二術蒼白南星秦艽二活羌獨防風寒桂枝艾血芎歸用熱芩痰芥氣參耆傷用威靈紅桃送背屬太陽膀胱經此經氣鬱痛不禁羌活勝濕湯最妙一點冷痛痰二陳勞役過度時時痛十全大補應安平營虛脈絡失養風動筋急痛繞耳後仿李東垣舒筋法當歸川桂枝防風根生耆生於術片薑黃另服化脈活絡丹一丸勞倦肩背疼桂術五加皮苡仁防己白蒺藜茯苓陽明虛肝風動當用柔甘溫養法首烏杞子柏子仁甘菊炭歸身胡麻羚角片海桐皮煨天麻童桑枝白蒺藜寒鬱氣隧胸引肩背皆痛宗內經諸痛皆寒之義以溫藥兩通氣血川桂枝川椒目熟附子橘皮烏藥支淡吳英延胡索制香附蘇梗遠志肉炒於朮白茯苓元紅花肝濁沖逆作痛乾薑烏梅炒白芍川黃連川柏細辛炒川楝失血胃絡虛肩背痛宜填補陽明人參炒棗仁白芍茯神陝歸身炙甘草督脈虛腎氣上逆陳參曰腎氣攻背項強溺頻是督脈不攝用奇經藥以峻補真陽為主鹿角霜歸身杜仲沙苑子青鹽鹿角膠杞子茯苓菟絲子陳參曰凡沖氣攻痛從背而上者系督脈主病治在少陰從腹而上者系衝脈主病治在厥陰此治病之宗旨也故肺俞之風用防風散痰臂流背痛用指迷丸痛風章遍身走痛名痛風血虛氣滯風濕攻濕熱生風不剋土痰壅經絡難宣通風淫末疾四肢屬日甚夜輕氣血從治主四物桃紅益痰熱二陳蔞相同上風羌防芷薄桂下濕薏藤宣漢庸小便如澀四苓散桑枝酒炒加湯中此雖血瘀筋不著總由血虛不內榮失養寒氣凝滯濕痰結因風行走痛自凶陳參曰五行六氣流行最速莫如風火重按疼痛少緩是為絡血血絡瘀痹久痛必入絡氣血不行發痹金沸草桃仁生鹿角新絳屑歸尾青蔥管積傷入絡作痛歸鬚降香末小茴香木香柏子仁野鬱金陰分伏熱痛風頭顛至足麻木刺痛用東垣滋腎丸肝腎虛下焦痛病後精采未復多言傷氣行走動筋當以甘溫和養人參當歸身白茯神枸杞沙苑子甘菊炭陳參曰相火寄於肝龍雷起於腎並從陰發越根蒂先虧藏納失職矣何書田曰經云諸痛癢瘡皆屬於心夫心主君火自當從熱而論然此但言瘡耳不可概諸他病也諸痛古人總以通字立法非攻下通利之謂謂通其氣血則不痛也然必辨明氣血在氣分者但行其氣弗動其血在血分者兼乎氣治所謂氣行則血隨之矣症實者氣滯血凝通其氣而散其血症虛者氣餒不能充運血衰不能滋榮當養氣補血兼寓通於補陳參曰諸痛宜辛潤宣通不宜酸寒斂澀恐留邪也頭眩章經曰諸風掉眩皆屬於肝頭為六陽之首耳目口鼻皆系清空之竅所患眩暈非外來之邪乃肝膽風陽上冒耳內風乃身中陽氣疲動頭眩昏暈氣血虛風寒暑濕痰火居內經頭眩責肝木風木主動丹溪痰火原相居元氣挾火動痰致虛火上炎痰則無化痰清暈二陳用菊藁本荊桔羌防撫芎勞役氣虛補中妙產後血虛四物須冒暑薷香麥薷味寒而無汗麻黃蘇火重頭眩宜清泄上焦竅絡之熱山梔天花粉桑葉元參連翹湖丹皮生地肝風頭眩腎宜溫肝宜涼阿膠麥冬白芍牡蠣生地萸肉甘菊絡熱眩暈羚羊角元參生地石菖蒲連翹鬱金營血虛頭眩西枸杞胡麻左牡蠣川石斛桑葉柏子仁內風挾痰頭眩煨天麻法半夏雲茯苓甘菊花白蒺藜廣橘皮西杞子鮮竹瀝陰虛陽升頭眩補腎滋肝育陰潛陽兼鎮攝治大熟地山萸肉五味子牡蠣淮牛膝龜版心麥門冬靈磁石茯神炒遠志屬下虛頭眩都氣丸加車前淡天冬動怒鬱勃痰火風火併熾頭眩二陳湯龍薈丸加減治之何書田曰精液有虧肝陰不足血燥生熱熱則風陽上升竅絡阻塞頭目不清眩暈跌僕治宜緩肝之急以熄風滋腎之液以驅熱如虎潛丸侯氏黑散地黃飲子滋腎丸復脈飲湯等方介以潛之酸以收之厚味以填之或清上實下之法風木過動必犯陽明嘔吐不食法當泄肝安胃或填補陽明又法辛甘化陰清金平木治痰須健中熄風可緩暈陳參曰肝腎虛則多驚恐陽動莫制皆臟陰少藏耳
