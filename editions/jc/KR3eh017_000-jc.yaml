body:
  text: 序醫者意也意之所注往往如期而中夫醫之書多矣自神農嘗百草療病而後歧伯之刀圭伊尹之湯液暨乎漢唐歷宋元明以迄於今醫書增至千百餘種神明變通悉可隨機而應第卷帙繁多學者限於知識如何口誦心維此醫書之所以難得佳本也青浦何書田先生本儒者精於軒歧手著醫學妙諦一書分門別款計七十六章每章弓內經靈樞素問及諸名家各種方書論證根柢精審不磨之言為宗旨焉病因治法編為七言歌括詞意秩然有序後列各症條款應用方藥加之參論朗若列眉為家塾讀本也嘉定陳墨蓀少尉醫承世業學有淵源更師事先生之嗣平翁同遊講貫精通靈素百家今三折肱矣此書經咸豐庚申兵燹已多散佚墨蓀參互考證缺者補之復完全帙數十年來憑此編為人治病歷歷中肯百不失一真枕中秘也不欲自秘將付剞劂氏而郵書問序於余余素昧醫理公餘退圃翻閱各種方書略知梗概今觀是書簡而不遺要而不繁初學之士熟習而深思之於以上溯源流進觀堂奧不難契靈蘭之妙諦而參金匱之鴻文也是為序光緒十有八年歲次王辰仲秋之月賜進士出身誥授光錄大夫頭品頂戴軍機大臣兵部尚書兼都察院右都御史雲貴總督使者浙江仁和王文韶序於雲南節署序古之人有言不為良相則為良醫故夫察乎天地通乎神明調陰陽四時序得其正使太和之氣翔洽乎寰區以扶持國家之元運而攸遂群倫者相之職也惟醫亦然此其精蘊夫豈易言哉雖然其理固可推而知也吾嘗涉夫大海矣波濤極天彌望無際然徐而察之長風一吹水紋如彀極之萬里其致同也而後乃知至微者固寓乎極大而極大者實至微所積而成者也相與醫之業不猶是哉抉其精則意自有相忘乎無形而成治者也今我陳墨蓀先生以醫學妙諦一書相示且囑為序余受而讀之青浦何公書田之所著也公名在縉紳間昭昭藉甚今讀其書乃益悅然於神明之妙中分為三卷舉凡病情脈理治法藥品悉以韻語括之而附方於後驅遺靈樞啟發金匱即論文筆已有風水相遭之奇而況乎有極大者固寓乎其中哉神靈在手造化因心不刊之作也今先生將為付梓公諸海內先生固公子之門人也淵源澄澈故藝精而道明亟傳此書吾知其實有康濟之懷將使人人登諸壽域無疾病夭札之虞功同良相也又豈特為醫家之指南而已哉欽響不已爰為之序焉光緒癸巳秋七月蒙自楊文斌質公甫書於䐜山官廟之餐柏軒
