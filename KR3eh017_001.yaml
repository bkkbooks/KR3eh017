body:
  text: 卷上例言一何書田太夫子世居青浦北竿山本儒術通軒岐之學臨證著手成春日日遠近就診者門庭如市時或舟車往來吳會士大夫莫不爭先延致在嘉道間為吳下名醫之冠一先生成功後不復進取著述甚富曾刻竿山草堂詩文集行世暨江浙水利等書為林文忠公器識文章經濟推重當時實為醫名所掩耳一醫學妙諦先生手輯書也仿金匱要略分門別款每章之前專宗內經靈樞素問及採諸大家千古不磨之論為引證焉並列各症條款宜用湯劑皆出先生平時閲歷手定者也其病因治法編為歌括童而習之以便口誦心維為家孰讀本也一豫家世傳幼科松承庭訓咸豐癸丑奉家君命業醫須習大方脈調理諸症方稱成技於是命松負笈從平子夫子授業在門下甫十月適家君病足疾書來促余辭歸臨岐分袂蒙夫子執手殷殷論曰同事硯席未久遽唱驪駒未免耿耿因袖出一編語云此書我家習醫祕術即以贈行松老矣回首師門烏能自已光緒十九年歲次癸巳秋八月上浣穀旦小門人嘉定陳松謹識於四明需次卷上雜症中風章大指次指麻木不仁或肌肉微掣即為中風之先兆中風之症治須思審其所中善治之中腑風邪四肢著惡寒拘急脈浮遲中臟唇緩滯九竅鼻塞便閉不語時若中血脈口眼歪又有中經亦要知六經無病溺調和口不能言肢不持中臟當下腑當汗中經補血養筋宜中血脈者無他治養血通氣效最奇若中臟而兼中腑傷寒兩感症同危東垣大率主氣虛中風雖緣外中之風亦因內氣之虛也虛則氣多不貫一為風所入而肢體於是乎廢矣河間腎虛兼火治腎息失宜心火盛而腎水虧故熱鬱而生痰痰甚而發熱熱痿相因而風生丹溪主濕內生痰總是類中分明注治之先用開關法皂半辛黎俱為未和以麝香吹鼻中有嚏則生無不活醒後先投三合湯陳甘茯半應相當南蔞歸桔芩連術竹瀝薑汁共一湯左癱屬血瘓屬氣血虛加芍芎生地四物恐泥痰宜用薑汁炒瘀血桃仁與紅花瘀血症小便利大便黑或腹中懷痛氣弱參耆也同劑遺尿盜汗亦如之小便不通不可利殭蠶全蠍閉塞加鉤藤可治牙關閉肥人烏附以引經烏頭附子童便煮用氣實人參亦須忌脈右寸有力用參恐痰涎瘀經絡風盛自汗身體痛羌活防風並薄桂頭目不利或頭痛芎芷蔓荊辛芥穗無汗身疼加芷羌穹防蒼朮秦艽配心血內虧神恍惚茯神遠志菖蒲合或心動搖驚悸者竹茹酸棗辰砂益風痰熾甚須膽星防枳牙皂栝蔞仁食傷曲麥山楂枳便閉還須三化行三化湯用枳實川朴大黃羌活肝腎虛內風動胡麻天麻桂圓黃耆甘草熟地萸肉遠志五味蓯蓉當歸杞子首烏牡蠣甘菊蒺黎虎骨女貞牛膝陽虛衛疏人參當歸附子桑葉黃耆天麻於術或玉屏風加減衛虛絡痹桂枝黃耆附子羌活遠志薑黃氣虛人參黃耆白朮炙草當歸陳皮天麻薑棗肝腎同治人參茯苓蒺藜甘菊陳皮半夏枸杞天麻鉤藤風濕中脾絡六君子湯加南星附子腎陰虛肝風動熟地蓯蓉杞子首烏菊花菖蒲痰火阻竅羚角膽星竹瀝鉤藤連翹花粉橘紅丹皮菖蒲液虛風動復脈湯去薑桂固本湯去熟地加龜版五味加虎骨蓯蓉杞子淮膝黃柏包絡熱邪阻竅至寶丹犀角硃砂雄黃琥珀玳瑁西黃麝香龍腦金箔安息痰火上實清竅為蒙下虛上實多致顛頂之痰陳曰凡中風症有肢體緩縱不收者皆屬陽明氣虛當以人參為主附子耆草之類佐之若短縮牽攣則以逐邪為急朱丹溪曰麻為氣虛木是濕痰散血傷風章風能兼寒寒不兼風傷風元氣本素虛乘虛而入風邪居鼻塞身重頭亦病惡風發熱汗有餘脈來浮緩且無力參蘇飲服旋當祛法咳嗽去參加桑杏內有痰熱芩連進痰吐如膠旋覆花胸滿痰多貝簍順冬間自汗桂枝添若還無汗麻黃令傷食麥芽曲朴須中酒烏梅寇仁定頭痛芎卷不可無氣喘杏蘇亦莫剩風傷衛蘇梗豆豉杏仁川朴桔梗連翹木通滑石體虛感風參歸桂枝湯加陳皮中寒章太陽脈行由背抵腰外來風寒先傷陽經經氣逆斯病發中寒傷寒症非一傷則漸深中直入初起怖冷四肢寒無熱不渴身戰栗脈來無力又沉遲加味理中湯有益參甘白朮並乾薑加桂陳皮功妙極寒甚吳萸及川附用童便炒半夏茯苓吐有力生薑煎就須冷服伏其所主治其所因也無脈麝香豬膽吃泄瀉不止加耆升薑汁三匙嘔吐入舌卷囊縮指甲青脈絶蒸臍法當習用麝香半夏皂角為末納入臍中生薑一片貼臍上放大艾丸於上灸之寒邪客肺蘇梗桔梗杏仁連翹川朴枳殼豆豉橘紅桑皮風寒傷衛桂枝湯加杏仁寒邪兼濕淡豆豉蘇梗杏仁防己茯苓皮木通川朴寒客太陽膀胱經氣逆五苓散勞倦陽虛感寒杏仁茯苓皮生薑川朴川桂枝廣皮暑病章暑與濕為熏蒸黏膩之邪治不中竅暑熱從陽上蒸而傷陰化燥濕邪從陰下沉而傷陽變濁六氣傷人因人而化夏月盛暑氣注人令人病熱生暑症總由陰虛挾痰火脈虛身熱症可認腹痛泄瀉兼嘔吐噁心頭暈冒暑病傷暑身熱兼頭痛身如針刺躁難靜中暑寒熱自汗多咳嗽倦怠不知性動而得之病屬陽加味香薷湯可定香薷麥味茯甘陳豆朴木瓜次第尋川連燈心薑棗服氣虛白朮與參耆寒熱柴芩為要藥嘔吐藿半法尤精瀉用澤豬功最速去麥味渴增知粉效如神綿綿腹痛傷水冷乾薑滑石法從心小水不利或短赤澤瀉山梔並滑石搐攏加羌辨暑風胸滿枳檳消食積自汗不止用耆參水瀉木通澤有益頭痛川芎並石膏痰悶栝蔞及枳實以上陽症治法若居涼館喜風涼惡寒頭痛頭項強身形拘急熱無汗靜而得之陰寒傷宜用羌活與茅朮川朴乾薑及藿香柴蘇等分姜三片水煎熱服號升陽兼食神麯滑石妙內傷冰冷用炮姜陳曰六氣傷人因人而化陰虛者火旺邪歸營分為多陽虛者濕勝邪傷氣分為多暑傷氣分上焦開鬱杏仁通草象貝鬱金射於石膏半夏山梔豆豉滑石豆卷橘皮竹茹苡仁川朴元參香薷犀角蘆根丹皮甘草赤芍連翹竹瀝細生地益元散石菖蒲西瓜翠以上藥皆可參用之何源長先生家制定中丸方計十九味陳香薷三兩宣木瓜二兩公丁香一兩法半夏二兩廣木香一兩紫川朴一兩白檀香一兩建澤瀉二兩廣藿香四兩陳枳殼一兩紫蘇葉二兩飛滑石四兩軟柴胡一兩茅山術二兩山楂肉四兩川羌活一兩五錢赤茯苓二兩粉甘草二兩生葛根二兩右藥研末蜜丸每丸重二錢硃砂為衣開水送服孕婦及血症忌之暑風傷肺石膏連翹竹葉杏仁六一散苡仁橘紅甘草桑皮暑厥中惡暑熱必先傷氣分故舌發燥口渴身痛陳注蒼朮白虎湯加滑石暑熱阻氣中痞不運半夏瀉心湯去乾薑甘草加杏仁枳實竹心廣皮茯苓知母廣藿半夏黃芩白芍山桅川朴麥芽白蔻仁生脈四君湯清暑益氣湯煩勞傷暑胃虛金匱麥門冬湯如脈左關大木瓜麥冬沙參烏梅甘草暑入心營鮮生地元參銀花川連竹心石菖蒲丹參連翹犀角暑病久延傷液生脈散三才湯熟地人參天冬茯苓白芍辰砂暑熱深入劫陰阿膠門冬川連生地人參烏梅暑瘵寒熱舌白不渴吐血西瓜翠竹芯苡仁鮮荷葉杏仁滑石暑邪人厥陰危症消渴吐蛔舌縮肺氣阻塞若逆傳腔中必致昏厥心之下有膈膜與脊脅周圍相著所謂腔中也暑病必挾濕陳注川連黃芩乾薑人參楊梅川椒白芍枳實暑兼血症鮮生地緑豆皮通草石膏川貝枇杷葉白蔻仁知母苡仁丹皮連翹鬱金桑葉元參竹心杏仁橘紅六一散六味丸加阿膠麥冬沙參陳曰內經云病自上受者治其上上受者以辛涼微苦如竹葉杏仁連翹薄荷在中者以苦辛宣通如半夏瀉心湯法在下者以溫行寒性質重開下如河間桂苓甘露飲之類乃治三焦之大意暑病用苦辛味自能泄降也陳注桂苓甘露飲肉桂雲苓膏滑石術甘寒水瀉豬芩張司農集諸賢論暑病謂入肝則麻痹入腎為消渴瘦人之病慮涸其陰肥人之病慮虛其陽胃中濕熱得燥熱錮閉下痢稀水即協熱下痢熱病之瘀熱留絡而為遺毒注腸腑而為溺痢皆屬棘手注夏章濕熱蒸人夏日長氣虛體弱熱因傷胸中氣促四肢倦心煩食少不如常好臥口乾或泄瀉清暑益氣法無忌若還盜汗不時出煎服可加浮小麥便赤山桅滑石宜口渴烏梅花粉吃頭痛川芎與石膏嗽加杏石升蒼細用杏仁石膏而去升麻蒼朮木香砂仁胸不舒瀉可茯苓肉蔻益濕症章東南地卑恆多濕居民感受病非一或涉水中雨露蒸或過飲冷因而得小便短赤身體重骨肉痠麻行不疾漸加浮腫及身黃燥土滲濕湯可則茯苓香附半陳皮川朴澤豬蒼白朮引用砂仁並棗姜臨服半匙鹽可入炒飛鹽外濕寒熱身腫痛羌活防通加有力內濕胸滿兼嘔吐喘脹腹膨用枳實川連山楂炒蔔子溺閉車前木通益濕熱發黃仗茵陳山梔車前兼滑石丹溪云濕得燥收蒼朮為先不可卻濕從風散獨羌須濕久生熱連梔吃麻黃可用不宜多汗甚變端恐莫測陳曰濕阻上焦宜開肺氣佐淡滲通膀胱即啓上閘開支河導水勢下行之理內經云脾竅在舌邪滯竅必少靈致語言欲謇法當分利佐辛香以默運坤陽是太陰里症治法仲景云濕家大忌發散汗之則變痙厥切記脾陽不運濕滯中焦宜用術朴姜半以溫通之苓澤腹皮滑石以淡滲之陳又注火症章相火命門君火心二火一水難相均惟青屬水內經所謂一水不能勝二火五臟氣升皆是火氣有餘便是火須知妄動煉真陰內經又云一水不勝五火也心火亢枉陽強病人壯氣實鹹冷進癲狂便閉承氣湯大便如常解毒應治火熱錯語呻吟不眠煩躁脈數干作嘔惡實火可瀉從上方隨經調治須更定飲食勞倦身發熱元氣不足內傷症補中益氣味甘溫陽虛之火功偏勝相火熾甚以乘陰朝涼暮熱血虛成陰中之火甘寒降知柏四物功堪稱腎水受傷陰虛病面紅耳熱浮火乘左尺洪數無根火龜柏六味治如神以上補虛火法胃虛過食生冷物陽氣抑過不得伸火鬱之症升散好升陽散火用之靈命門火衰陽脫病面赤煩躁虛火盛足冷脈沉陰極燥回陽救急醫中聖六君桂附五味姜豬膽麝香加可進陰虛發熱火旺甚脈數無力屬心腎內傷發熱乃陽虛脈大無力脾肺分氣從左起肝之火陰火還從臍下引腳下熱來侵腹者斯人虛極藥難問治火之法始知涼次而寒取效可望寒取不效從熱之從之不效心茫茫是徒知熱以寒治至理尚未經細詳不知火熱不能退總由真水不能長妙法壯水以為主壯水自剋制陽光寒而熱者取之陰陰即腎水經言彰腎水既足心火降火非水偶誰能當回陽救急湯六君加附桂乾薑五味子麝香豬膽汁內傷章飲食勞倦是內傷或因飢飽過行房風寒傷人名外感辨明調治便無妨人迎左寸脈緊甚手背熱寒熱邪作無間歇惡寒無汗鼻不通此是外感症可別內傷之症氣口右寸洪手心有熱微惡風寒熱間作不知味更兼氣弱言語慵內傷惡寒得暖解外感近火寒仍攻外感內傷相挾者脈症並見須辨通內傷不足急補之外感有餘得不同或先補養或先散先後之間無苟從益氣湯加薑棗吞氣和微寒散為精救腎水虧酒炒柏入心養血紅花增升麻柴胡自汗去夜間不寐加棗仁姜炒川芎蔓荊頭痛用口渴乾葛斯為靈顛頂痛時辛藁本怔忡驚悸棗茯神甚者用遠志柏仁菖蒲等味食加麥曲山楂實瀉添澤芍與雲苓川連枳實除胸悶有痰茹半茯為君防己木瓜治腳弱龍骨牡蠣療遺精身熱羌防芎芷用兼風寒頭痛者加之火升知母柏元參連芩兩味清內熱菊花熟地治眼疼傷食章後天之本屬脾胃納化飲食滋營衛養生妙訣節飲食脾胃受傷體弱意胸腹飽悶並作酸噯氣惡食腹痛纍甚則發熱與頭疼惟身不痛傷寒異左關平和右關緊香砂平胃功有濟川芎枳實並藿香水姜煎服食須忌消肉查果消面蔔消糯米食檳神麯飯食神麯兼麥芽生冷姜青皮栝蔞果草果逐魚傷橄欖椒紫蘇稻草可將消牛肉麝香能消蔬果積葛梅白蔻酒傷入挾痰半夏與生薑挾氣香砂枳殼益挾寒蘇梗葛根柴食冷草蔻桂朴吃傷飲須合四苓湯嘔吐臨服加薑汁茯苓澤術治脾虛泄瀉肉蔻車白朮食積鬱久成濕熱芩連大黃不可缺再入白朮並澤瀉去藿砂仁與蒼朮丹溪謂受飲食寒初起溫散溫利適久則成鬱郁成熱熱久生火溫不得宜用辛涼發表之辛寒理中邪易闢輕則損谷重逐滯東垣妙論總莫忽陳曰胃主納飲食不下胃有病也脾主化飲食不消脾有病也六郁章氣鬱濕鬱痰鬱火鬱血鬱食鬱滯而不通病名郁氣血痰火濕與食丹溪製成越鞠丸方用茅朮香附山梔川芎神麯能解諸郁有功績寒熱頭疼胸膈痛目暗耳聾脈沉澀氣鬱木香烏藥加砂薄青皮桂枝及濕鬱周身骨節痛陰寒則發肢無力脈來沉細茯苓芷咳嗽氣急為痰鬱手足麻木脈滑沉痰塊堅硬咯不出須加桔梗杏仁蔞半夏南星及海石火鬱口苦心煩甚頭痛惺惺目昏黑小便赤色脈沉數青黛黃連功妙極午後發熱為血鬱小便通處移不得脈來沉澀或芤結上下失血桃紅入噯氣作酸為食鬱胸膈飽悶面黃色痛不思食脈沉緊枳實砂仁加亦適春加防風夏苦參秋冬之令吳萸益陳曰鬱則氣滯氣滯久則必化熱熱久則津液耗而不流升降之機失度初傷氣分久延血分甚則延為郁勞用藥大旨宜苦辛潤宣通不宜燥熱斂澀呆補氣病章捍衛沖和之謂氣妄動變常火之例局方燥熱與辛香以火濟火有何利生冷生氣高陽言誤言也氣多是火丹溪意隨症調治辨虛實虛者右手脈無力言懶氣短身倦怠胸中虛滿不思食塞因塞用內經有明文六君子補中益氣亦有益滯氣實者脈洪實憂愁忿怒因而得胸脅脹滿噫不通吐酸噁心心鬱抑種種氣滯若何醫分心氣飲最相宜通半茯苓赤芍桂羌桑蘇梗青陳皮術香甘腹引薑棗香附谷檳胸滿施脅痛芎柴為要藥痛居少腹吳萸移氣滯氣虛合補劑六君兼用功誠異性急加柴熱加芩女人烏藥香附利氣滯腰痛枳殼瓜木瓜翻胃沉香磨順氣痰病章張仲景五飲互異其要言不煩當以溫藥和之仲景云脈沉而弦屬飲面色鮮明屬飲飲家咳甚當治其飲不當治咳仲景外飲治脾內飲治腎內經云不得臥臥則喘甚痹塞乃肺氣之逆亂也著枕咳嗆如上氣不下下必衝上逆其痰飲伏於至陰之界腎臟絡病無疑昔肥今瘦為飲人身怪病皆痰甚脾胃虛弱濕不滲濕熱相蒸逆生痰遊行到處皆成病脾氣散精津液生為氣為血體豐盛或感氣鬱濕熱風津液皆化為痰飲痰隨氣升先治氣氣升屬火降火勝實脾燥濕是良方實脾飲用蒼朮木瓜香附甘草川朴木香腹皮白蔻大棗生薑因痰生於脾胃也降火順氣能接命古人總用二陳湯隨病加減如神應有火益以梔芩連降氣蘇殼蓯蓉順頭疼鼻塞是挾風紫蘇羌活防風進面紅咳喘咯不出卒倒痰涎為癇痙熱痰青黛芩連蔞花粉知母桔梗入身重疲倦名挾濕面目浮腫氣喘急脈形濡滑為濕痰燥濕健脾蒼白朮吐咯不出痰硬極動則氣喘名夾郁右脈沉滑左手平星蔞附香附貝兼海石嘔吐噁心胸痞塞遇寒則甚滑遲脈寒痰治用肉桂姜益智款冬細辛吃細辛不可輕用猝倒仆地不知人角弓反張風痰立黑卜白附半天麻殭蠶牙皂兼竹瀝噁心嘔吐口咽酸胸膈飽悶為夾食右關緊滑名食痰平胃面芽楂枳實氣虛須用六君湯貝母花粉二冬天冬麥冬合血虛須用四物湯地芍芎歸薑汁益脅痰白芥子青皮經絡滯痰須竹瀝加薑汁感寒引動宿飲上逆乾薑桂枝杏仁茯苓苡仁五味白芍半夏蛤粉甘草痰熱內閉神昏半夏桔梗鬱金橘紅菖蒲枳實薑汁竹瀝木火犯中胃火二陳湯去甘草加丹皮川斛桑葉羚角片連翹川朴降香汁白蒺藜半夏橘紅濕熱蒸疾茅朮黃柏栝蔞枳實山梔白蒺藜黃連半夏川朴橘紅萊蔔降香汁腎虛多痰治痰之本熟地茯苓補骨脂車前五味子淮膝遠志胡桃肉枸杞宜蜜丸脾胃陽虛六君子湯加木香益智外臺茯苓飲茯苓人參白朮枳實橘皮生薑茯苓桂枝湯寒飲濁邪上衝膻中不臥迷呆南星薑汁製茯苓菖蒲白附薑汁炒桂枝炙草中虛濕熱中焦陽氣健運不息陰濁痰涎焉有竊踞之理二陳加人參石斛苡仁枳實茯苓如目黃齦血不作實熱治喉癢痰飲挾燥杏仁橘紅天花粉象貝茯苓半夏曲哮喘伏飲小青龍湯去細辛氣火不降二陳湯去甘草加栝蔞山梔鬱金左金丸枳實竹瀝薑汁胸次清陽少旋支脈結飲頭中冷痛筋脈掣痛四末時冷末即支也外臺茯苓飲栝蔞半夏桂枝參朮枳橘飲薤白茯苓薑汁肝絡久病懸飲流入胃絡致痛不已宜太陽陽明開闔方法人參甘草煨姜茯苓桂枝南棗腑中之氣開闔失司最慮中滿夫太陽司開陽明司闔濁陰瀰漫通腑即是通陽仿仲景開太陽法牡蠣澤瀉乾薑防己五味陳曰喻嘉言謂濁陰上加於天非離照當空氣露焉得退避反以地黃五味陰藥附和其陰陰霾沖逆肆空飲邪滔天莫測當用仲景熟地附配生薑法掃群陰以驅飲邪維陽氣以立基本咳嗽章乾咳附咳嗽當分二病為有聲無痰咳症知有痰無聲名曰嗽嗽屬脾家濕痰欺咳為肺經痰氣盛均為肺病總無疑新者痰食風寒屬或瀉或散易治之久者勞火陰虛症雖可攻補卻難醫治用貝母杏紫蘇花粉桔梗及前胡梔芩清火寬中殼枳殼半夏消痰甘橘荷薄荷引用生薑與燈草飲時食後起沉疴風痰添以星南星瀝汁肺實桑葶不可無脈右浮洪有力或氣喘甚若還風嗽聲難轉麻黃羌活防風蘇清早嗽多肺火動天麥二冬在所用上午嗽者胃火伏知母石膏病自中下午嗽多屬血虛四物補陰二冬共阿膠五味款冬花元參北沙皆可奉春嗽柴芎芍加入夏宜清火麥冬得秋用桑防冬解表麻防