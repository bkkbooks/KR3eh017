苓芡實蓮子鱉甲知母草果生地桃仁花粉青蒿首烏丹皮龜板澤瀉炙草桑葉天冬六味丸清骨散銀柴胡胡黃連秦艽地骨皮鱉甲蘇青蒿知母粉甘草暑熱拒格三焦嘔逆不納宗半夏瀉心法半夏黃芩炙草大棗川連人參乾薑胃虛嘔逆旋覆代赭湯熱結痞結半夏人參茯苓川連枳實薑汁瘧兼熱痢人參乾薑廣皮歸身枳實川連銀花黃芩白芍山楂心經瘧熱多神昏譫語舌邊赤心黃防痙厥犀角元參竹葉連翹麥冬銀花救逆湯桂枝炙草乾薑棗子蜀膝龍骨牡蠣此方去乾薑加白芍可參用心經瘧久動及其營必煩渴見紅宜滋陰法肺經瘧久傷及其津必胃閉肺痹宜清降法陳曰瘧發久邪必入絡絡屬血分汗下兩者未能逐邪仲景制鱉甲煎丸治絡聚血邪久則血下溫瘧例忌足六經藥如柴葛之類用桂枝白虎湯主之古稱三陰大瘧以肝脾腎三臟之見證為要領陽瘧之後養胃陰陰瘧之後理脾陽主之太陽經行身之背瘧發背冷不由四肢是少陰之陽不營太陽霍亂章霍亂之症起倉猝外因所感內因積胃中停蓄難運消吐瀉交作腹痛極上焦但吐而不瀉下焦但瀉無此逆中焦吐瀉兩兼之偏陰多寒偏陽熱因風怕風有汗沾因寒怕寒無汗焉因暑煩熱並躁悶因溫倦怠身不便因食胸肺自飽脹治用藿香正氣堪紅花木瓜轉筋用食傷曲麥芽山楂添腹痛須加炒白芍寒宜肉桂炮姜權枳實青皮心下痞柴胡乾葛寒熱纏小便不利豬苓澤瀉中暑發熱連薷傳手足厥冷脈將絶鹽納臍中燒艾煙火灸人醒後施藥細將寒熱陰陽參又有一種乾霍亂腹痛欲死病勢悍不吐不瀉絞腸痧鹽水吐之神妙案但得吐瀉病無妨米飲熱湯切莫勸藿香正氣散廣藿白芷茯苓陳皮夏曲紫蘇腹皮白朮川朴桔梗甘草生薑棗子清脾飲白朮青皮甘草草果茯苓黃芩川朴柴胡半夏生薑泄瀉章古稱注下症泄瀉之原分六說虛濕寒痰食與熱五泄之名濕多成五泄內經傳溏泄痢洞滑也三虛之旨先賢訣飲食傷脾虛不化色欲傷腎腎虛極腎虛自不能容藏忿怒傷肝木土克肝虛則木來剋土健脾利水是主方燥濕升提不可缺芍陳曲朴木香車二苓木通瀉二術蒼白二術腸鳴腹痛屬火明方中益以梔連芩腹不痛者是屬濕蒼白朮半加茵陳完穀不化屬虛意術扁山藥砂仁參或瀉不瀉或多少屬痰半夏天南星痛甚而瀉瀉痛止屬食枳實山楂增瀉不甚而腹微痛是為寒瀉香砂仁新瀉宜瀉宜消食久瀉升提溫補益泄久下陷亦用升升麻柴胡更有力腎虛送下四神丸防風羌活兼風入虛泄久泄古有方黃土一匙沖服食暑濕熱胃苓湯即平胃散合五苓湯益氣湯白蔻桔梗鬱金橘皮藿香杏仁川朴降香茯苓豬苓廣皮寒水石澤瀉滑石木瓜檀香汁香砂異功散即六君子去半夏加木香砂仁四苓散即五苓去桂可加椒目益智川朴橘白黃連石羔扁豆甘草神麯吳萸砂仁山楂麥芽絲瓜葉資生丸濕熱人參柴胡羌活山楂防風川朴茯苓茵陳苡仁麥芽川連白芍益智茅朮黃芩廣皮川柏升麻甘草澤瀉半夏豬苓六曲藿香白蒺藜五苓散四苓散小溫中丸去川芎中暑必頭脹喜冷飲咳嘔心中脹舌白兼瀉柴朴半夏石羔黃芩杏仁橘皮中傷濕滯胃苓湯加桂木生薑四君子加炮姜肉桂寒濕中宜運通下直分利柴朴藿梗益智木香木瓜廣皮扁豆炮姜砂仁茅朮吳萸肉果白朮腹皮四苓散真武湯術苓芍附姜肝犯胃消渴吐清涎腹痛川連黃芩烏梅白芍乾薑荷葉厚朴豬苓椒目澤瀉木瓜桑葉延胡桂木甘草半夏廣皮米仁石脂棗仁人參川楝異功散加木瓜亦可參用膽郁傷脾柴胡白芍青皮黃芩桑葉丹皮脾胃陽虛乾薑白芍煨升麻益智仁廣皮當歸澤瀉葫蘆巴煨葛根木瓜炮姜川朴穀芽半夏香附四君子湯晨泄用治中湯人參甘草青皮白朮乾薑陳皮夕泄用四神丸吳萸肉豆蔻五味補骨脂四神丸加法青皮沙苑子杜仲當歸木瓜小茴香理中湯加法五味赤石脂枸杞葫蘆巴胃苓湯茅朮陳皮白朮茯苓澤瀉川朴甘草肉桂豬苓桂苓朮甘湯加法鹿角煨姜南棗禹量石脂丸加法枸杞中虛腹痛炙草白芍煉飴糖南棗茯苓食傷人參炙草穀芽葛根廣皮荷蒂陳曰脾陽微中焦聚濕則少運腎陰衰回攝失司為瘕泄是中宜旋則運下宜封乃藏腎陽自下炎蒸脾陽始得變運王氏以食下不化為無陽陳參曰熱勝濕蒸氣傷人倦陰莖囊腫是濕熱甚而下墜入府與方書莖竅症有間足腫是陽微濕聚治胃必佐泄肝制其勝也仲景云脈弦為胃減大則病進脾臟宜補則健胃腑宜疏乃清脾宜升胃宜降苦寒必佐風藥是李東垣之旨久泄必傷腎八味承氣乃從陰引陽水瀉少腹脹滿少腹為厥陰肝經肝失疏泄當以五苓利水導濕仿古人急開支河之喻何書田曰少陽為三陽之樞相火寄焉風火煽胃而腐熟五穀少陰為三陰之樞龍火寓焉熏蒸臟腑而轉輸糟粕胃之納脾之輸皆火之運也然非雷藏龍馴何能無燥無濕無冒明燎上之患必土奠水安斯不泛不濫無清氣在下之患故曰五泄之治平水火者清其源崇堤土者塞其流耳痢疾章古稱滯下乃濕熱氣薄腸胃河間丹溪僉用清熱導法六臟屬陽以通為用五臟皆陰藏蓄為本先瀉後痢脾傳腎則逆即土剋水意由伏邪垢滯從中不清因而下注矣痢疾原來下血膿裡急後重腹痛攻總因食積兼氣滯青黃赤白黑不同白自大腸來氣傷赤是血傷小腸中氣血俱傷兼赤白食積為黃是真的白膿結膩是屬痰黑者須知死血色諸痢下迫皆屬火勿妄以白為寒則後重滯應調氣舒清血便膿應日除通滯之湯條芩利木通蘇梗炮姜檳俱熱用黃連痛煨木胸中不寬砂殼須小便短則車前滑後重將軍不可無頭疼身熱風邪痢葛羌蒼朮防風驅噁心作酸食積痢麥芽曲實山楂配內傷痢疾小腹疼桃紅紫黑血能治身不熱而腹不疼大孔迫甚黃水利此為氣鬱用升麻更有柴防不可棄噤口煩熱腹痛加水穀入胃即吐地胃熱石蓮參陳倉米宜酒積葛梅白蔻濟天行疫疾老幼傳合用散毒無他劑夏月香薷扁豆增銀花腸澼血能清諸痢日久須豆芍補脾山藥術雲苓下陷升柴亦必用白久氣虛黃耆參紅久血虛歸芍進血痢不止阿膠應荊芥蒲黃同炒黑薑炭加之少許吞若還不停血餘益痢久之人虛極明四君四物可兼用脈遲肉蔻炮姜靈暑濕熱成痢用藥方法與泄瀉依稀厥陰伏熱先厥防痙川連黃芩丹皮白芍陳皮女貞子川柏銀花炮姜阿膠茯苓炒生地滑石甘草北秦皮枳實穀芽白頭翁協熱痢白頭翁湯白頭翁黃連加黃芩北秦皮黃柏白芍茯苓川朴陳皮山楂益元散木香銀花扁豆澤瀉脾營虛寒脈沉微不渴舌白歸身白芍肉桂炮姜益智仁青皮炙草楂肉茯苓血痢血水有紅有紫純血難治茅朮川朴炒樗皮肉果槐米歸身銀花山楂炒地榆廣皮炙草白芍人參肉桂羌活白朮煨姜南棗六味丸山楂豬苓黃芩制軍加法延胡川連黃柏陽虛下痢治以溫藥通之胃苓湯加炮姜益智青皮赤石脂粳米公丁香六君子湯加肉桂陽明不闔堵截陽明法變脹主為未傳脈見絃動是無胃也人參赤石脂粳米炮姜脾腎兼虛人參覆盆子補骨脂巴戟天熟地茯苓菟絲子禹餘糧赤石脂蓮肉萸肉山藥淡蓯蓉芡實炮姜木瓜五味痢傷陰液復脈湯去桂枝麻仁熟地歸身麥芽茯苓炙草炙升麻山藥烏梅白芍生地阿膠防風根木瓜丹皮查肉山梔澤瀉粉豬苓虛氣下陷陷者舉之人參炙草歸身防風荷葉西耆廣皮白芍升麻久痢傷腎下焦不攝人參菟絲補骨脂熟地炭五味鹿茸茯苓赤石脂春砂仁山楂當歸白朮沙苑子杜仲附子淡蓯蓉苓姜術桂湯濟生腎氣湯黑地黃丸蒼朮熟地五味乾薑噤口痢川連人參草決明山楂熟地黃芩白芍木香汁銀花乾薑阿膠白頭翁湯亦用瘧變痢柴胡人參白芍焦查甘草吳萸黃芩當歸丹皮茯苓烏梅香附附子肉桂秦皮牡蠣復脈湯瀉心湯救逆湯去乾薑腸風兼血痢無積淚之聲赤石脂丸四苓湯加滑石桂心此分消其濕生地炭炒萸肉炒歸身炒枸杞川斷肉五味子噤口日久圊次多四君子湯加扁豆苡仁桔梗砂仁炮薑炭肉果為散香粳米飲調服之石蓮葛根青皮烏梅早晨痢重腎氣丸炒焦蔔乾地黃山萸肉山藥丹皮茯苓福澤瀉附子桂枝午時痢重參苓白朮散人參茯苓白朮甘草山藥扁豆苡仁建蓮砂仁桔梗陳皮陳曰酒客濕滯腸中久痢非風藥之辛佐苦味入腸何能勝濕逐熱久病飲食不減是腸中病也參曰痢久陰液消亡無以上承必唇燥舌乾肛墜脹陰液涸則小便不通胃氣逆則厭食欲嘔此皆痢之疑症也久痢久瀉為腎病熱病陰涸急救其陰胃關得蘇方妙否則犯喻嘉言所指客邪內陷液枯致危之戒宜用甘酸化陰法脈右搏大乃痢疾所大忌脾陽動則冀運行健痢自瘳痢日久則望臟腑自復非助以提補不可痢而口渴者屬太陰厄忒之來由乎胃少納穀致逆則土敗之勢也厄逆章俗稱打厄名厄逆胃火上衝肝火翼肺金之氣下降難和胃清金肝自抑橘皮竹茹丁蒂湯丁柿橘皮竹茹吃丁陳辛溫運中氣之痞塞茹蒂苦寒治下焦之逆氣飲食太過儲胸膛曲芽枳實和檳榔痰涎塞壅脈來滑木香苓夏應同嘗水停心下汩汩聲白朮澤瀉豬雲苓發熱煩渴脈來數石羔知母柴胡芩滯氣盈兮胸腹滿砂夏木香此其選胃中虛冷脈來遲附術乾薑官桂暖脈形無力氣甚虛六君子湯妙自如沉香磨用治諸厄薑汁和蜜全消除胃虛虛陽上逆仲景橘皮竹茹湯橘皮竹茹人參甘草南棗生薑肺氣鬱痹鬱金枇杷葉豆豉射干川貝母通草此開上焦之痹理陽驅陰從中治法與下陽虛濁陰上逆一門同參看陽虛濁陰上逆人參附子丁香皮柿蒂茯苓乾薑川椒代赭石烏梅半夏粳米脾腎兩寒陽氣竭木香流氣飲煎當歸炙草乾薑或加肉桂虛寒加丁香理中湯加丁香肉桂附子肉果霜炙草枳實大黃食滯厄六和中飲加木香乾薑陳參曰肝腎陰虛氣從臍下衝起此相火上炎挾其沖氣用大補陰丸峻補真陰承製相火此丹溪法黃柏熟地豬脊髓知母龜板陰火上衝而吸氣不能入胃脈反逆陰中伏陽即為厄用滋腎丸以瀉陰中伏熱此東垣法黃柏知母肉桂又曰凡人之心胸背部須藉在上清陽舒展乃能曠達
